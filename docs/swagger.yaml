  # ══════════════════════════════════════════
  # RECORDS
  # ══════════════════════════════════════════

  /records:
    get:
      tags: [Records]
      summary: List records (event timeline)
      description: |
        Returns a paginated, reverse-chronological list of records.
        **Admin only.**

        Supports rich filtering — combine any of the query parameters below:
          - **`eventType`** / **`entityType`** narrow by category.
          - **`entityId`** matches the record's primary entity.
          - **`actorId`** shows everything done by a specific user (useful for auditing staff).
          - **`leadId` / `studentId` / `teacherId` / `groupId` / `enrollmentId` / `paymentId` / `attendanceId`**
            use the `refs` map, so you get every record *mentioning* that participant —
            even ones where it's not the primary entity (e.g. payments for a given student).
          - **`from` / `to`** bound the window by `createdAt`.
          - **`search`** runs a case-insensitive regex on `description` and `code`
            (useful for typing in a code like `REC-20260418-0001`).

        Examples:
          - Churn view → `?eventType=ENROLLMENT_DROPPED&from=2026-04-01`
          - Full history of a student → `?studentId=664f1a2b3c4d5e6f7a8b9c0d`
          - Audit one teacher → `?actorId=664f1a2b3c4d5e6f7a8b9c0e`
      operationId: listRecords
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - name: eventType
          in: query
          required: false
          description: Filter by programmatic event type.
          schema:
            $ref: "#/components/schemas/RecordEventType"
        - name: entityType
          in: query
          required: false
          description: Filter by primary entity type.
          schema:
            $ref: "#/components/schemas/RecordEntityType"
        - name: entityId
          in: query
          required: false
          description: Filter by the primary entity's ObjectId (matches `entityId` directly).
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c50"
        - name: actorId
          in: query
          required: false
          description: Filter to records performed by this user (`actor.userId`). System events are excluded.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c0d"
        - name: leadId
          in: query
          required: false
          description: Match any record whose `refs.leadId` equals this ObjectId.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c50"
        - name: studentId
          in: query
          required: false
          description: Match any record whose `refs.studentId` equals this ObjectId.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c0d"
        - name: teacherId
          in: query
          required: false
          description: Match any record whose `refs.teacherId` equals this ObjectId.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c0e"
        - name: groupId
          in: query
          required: false
          description: Match any record whose `refs.groupId` equals this ObjectId.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c10"
        - name: enrollmentId
          in: query
          required: false
          description: Match any record whose `refs.enrollmentId` equals this ObjectId.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c20"
        - name: paymentId
          in: query
          required: false
          description: Match any record whose `refs.paymentId` equals this ObjectId.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c30"
        - name: attendanceId
          in: query
          required: false
          description: Match any record whose `refs.attendanceId` equals this ObjectId.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c40"
        - name: from
          in: query
          required: false
          description: Lower bound for `createdAt` (inclusive). ISO date or date-time.
          schema:
            type: string
            format: date
            example: "2026-04-01"
        - name: to
          in: query
          required: false
          description: Upper bound for `createdAt` (inclusive — end-of-day applied if a date is given).
          schema:
            type: string
            format: date
            example: "2026-04-30"
        - name: search
          in: query
          required: false
          description: Case-insensitive regex match against `description` and `code`.
          schema:
            type: string
            example: "Ali Valiyev"
      responses:
        "200":
          description: Records found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordsListResponse"
              example:
                records:
                  - _id: "664f1a2b3c4d5e6f7a8b9cAA"
                    code: "REC-20260418-0002"
                    eventType: "LEAD_STATUS_CHANGED"
                    entityType: "Lead"
                    entityId: "664f1a2b3c4d5e6f7a8b9c50"
                    description: "\"Ali Valiyev\" murojaati holati: yangi → o'quvchiga aylantirildi"
                    actor:
                      userId: "664f1a2b3c4d5e6f7a8b9c0d"
                      role: admin
                      name: "Mardonbek Khamidov"
                    refs:
                      leadId: "664f1a2b3c4d5e6f7a8b9c50"
                      groupId: "664f1a2b3c4d5e6f7a8b9c10"
                    metadata:
                      from: new
                      to: converted
                    createdAt: "2026-04-18T09:14:02.881Z"
                    updatedAt: "2026-04-18T09:14:02.881Z"
                  - _id: "664f1a2b3c4d5e6f7a8b9cAB"
                    code: "REC-20260418-0001"
                    eventType: "LEAD_CREATED"
                    entityType: "Lead"
                    entityId: "664f1a2b3c4d5e6f7a8b9c50"
                    description: "Mardonbek Khamidov yangi murojaat \"Ali Valiyev\" ni qo'shdi"
                    actor:
                      userId: "664f1a2b3c4d5e6f7a8b9c0d"
                      role: admin
                      name: "Mardonbek Khamidov"
                    refs:
                      leadId: "664f1a2b3c4d5e6f7a8b9c50"
                    createdAt: "2026-04-18T09:12:33.221Z"
                    updatedAt: "2026-04-18T09:12:33.221Z"
                total: 2
                page: 1
                limit: 20
                totalPages: 1
                hasNextPage: false
                hasPrevPage: false
                code: recordsFound
                message: "Yozuvlar ro'yxati olindi"
        "400":
          description: Invalid `eventType` or `entityType` query value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidEventType:
                  value: { code: "invalidField", message: "Hodisa turi noto'g'ri" }
                invalidEntityType:
                  value: { code: "invalidField", message: "Obyekt turi noto'g'ri" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /records/entity/{entityType}/{entityId}:
    get:
      tags: [Records]
      summary: Full timeline for a single entity
      description: |
        Returns every record tied to one specific entity — both as the primary
        `entityId` and as a `refs.*` reference. Useful for the "Activity" tab on a
        student, lead, enrollment, group, or payment detail page.

        **Admin only.** Sorted `createdAt` descending, paginated.
      operationId: getEntityTimeline
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/recordEntityType"
        - $ref: "#/components/parameters/recordEntityId"
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
      responses:
        "200":
          description: Records found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordsListResponse"
        "400":
          description: Invalid `entityType` or non-ObjectId `entityId`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidEntityType:
                  value: { code: "invalidField", message: "Obyekt turi noto'g'ri" }
                invalidId:
                  value: { code: "invalidId", message: "ID noto'g'ri kiritildi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /records/{id}:
    get:
      tags: [Records]
      summary: Get one record by ObjectId or code
      description: |
        Returns a single record. The `{id}` path parameter accepts either:
          - a MongoDB **ObjectId** (24 hex chars), or
          - a human-readable **code** like `REC-20260418-0001`.

        The server decides by format, so a staff member can paste a code from a
        screenshot directly into the URL.

        **Admin only.**
      operationId: getRecord
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/recordIdOrCode"
      responses:
        "200":
          description: Record found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordResponse"
              example:
                record:
                  _id: "664f1a2b3c4d5e6f7a8b9cAA"
                  code: "REC-20260418-0001"
                  eventType: "ENROLLMENT_DROPPED"
                  entityType: "Enrollment"
                  entityId: "664f1a2b3c4d5e6f7a8b9c20"
                  description: "Ali Valiyev \"Python — Oqshom 1\" guruhidan chiqdi"
                  actor:
                    userId: "664f1a2b3c4d5e6f7a8b9c0d"
                    role: admin
                    name: "Mardonbek Khamidov"
                  refs:
                    studentId: "664f1a2b3c4d5e6f7a8b9c0f"
                    groupId: "664f1a2b3c4d5e6f7a8b9c10"
                    enrollmentId: "664f1a2b3c4d5e6f7a8b9c20"
                  createdAt: "2026-04-18T09:12:33.221Z"
                  updatedAt: "2026-04-18T09:12:33.221Z"
                code: recordsFound
                message: "Yozuvlar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: recordNotFound
                message: "Yozuv topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ══════════════════════════════════════════
  # SALARIES
  # ══════════════════════════════════════════

  /salaries:
    get:
      tags: [Salaries]
      summary: List salary records
      description: |
        Returns paginated salary records.

        **Scope**:
          - `admin` — sees every salary, can filter by `teacher` query.
          - `teacher` — automatically scoped to their own salaries
            (the `teacher` query is ignored to prevent leakage).

        **Filtering**:
          - `month=YYYY-MM-01` — exact month
          - `from=YYYY-MM-01` & `to=YYYY-MM-01` — month range (inclusive)
          - `status=pending|paid`

        Salaries are returned newest month first.
      operationId: listSalaries
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - name: teacher
          in: query
          description: Filter by teacher ObjectId. Admins only — ignored for `teacher` role.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c0d"
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid]
            example: "pending"
        - name: month
          in: query
          description: Exact month (any date inside the month works; server normalises).
          schema:
            type: string
            format: date
            example: "2026-04-01"
        - name: from
          in: query
          description: Range start month (inclusive).
          schema:
            type: string
            format: date
            example: "2026-01-01"
        - name: to
          in: query
          description: Range end month (inclusive).
          schema:
            type: string
            format: date
            example: "2026-04-01"
      responses:
        "200":
          description: List of salaries
          content:
            application/json:
              schema:
                type: object
                properties:
                  salaries:
                    type: array
                    items:
                      $ref: "#/components/schemas/Salary"
                  total: { type: integer, example: 12 }
                  page: { type: integer, example: 1 }
                  limit: { type: integer, example: 20 }
                  totalPages: { type: integer, example: 1 }
                  hasNextPage: { type: boolean, example: false }
                  hasPrevPage: { type: boolean, example: false }
                  code: { type: string, example: salariesFound }
                  message: { type: string, example: "Oyliklar ro'yxati olindi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Salaries]
      summary: Create a salary record manually
      description: |
        Creates a single salary record for one teacher in one month.

        The server **auto-computes** the per-group breakdown and `totalAmount`
        from that teacher's groups and the month's paid payments. The provided
        `bonus` and `deduction` are folded into the final `netAmount`.

        Errors:
          - `salaryAlreadyExists` (400) — the teacher already has a salary for this month.
            Use `POST /salaries/generate` with `overwrite=true` instead.
          - `notATeacher` (400) — the target user is not a `teacher`.

        **Admin only.**
      operationId: createSalary
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalaryInput"
            example:
              teacher: "664f1a2b3c4d5e6f7a8b9c0d"
              month: "2026-04-01"
              bonus: 200000
              deduction: 0
              note: "Aprel oyligi"
      responses:
        "201":
          description: Salary created
          content:
            application/json:
              schema:
                type: object
                properties:
                  salary:
                    $ref: "#/components/schemas/Salary"
                  code: { type: string, example: salaryCreated }
                  message: { type: string, example: "Oylik yaratildi" }
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingField:
                  value: { code: "missingField", message: "O'qituvchi kiritilishi shart" }
                invalidMonth:
                  value: { code: "invalidMonth", message: "Oy noto'g'ri kiritildi" }
                notATeacher:
                  value: { code: "notATeacher", message: "Foydalanuvchi o'qituvchi emas" }
                salaryAlreadyExists:
                  value: { code: "salaryAlreadyExists", message: "Bu oy uchun oylik allaqachon mavjud" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Teacher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example: { code: "userNotFound", message: "Foydalanuvchi topilmadi" }
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /salaries/calculate:
    get:
      tags: [Salaries]
      summary: Preview a teacher's salary for a month (no persistence)
      description: |
        Returns the computed salary breakdown for one teacher in one month,
        **without** writing anything to the database.

        Use this to drive a "Calculate" button on the admin payroll UI before
        committing the salary with `POST /salaries` or `POST /salaries/generate`.

        **Admin only.**
      operationId: calculateSalary
      security:
        - BearerAuth: []
      parameters:
        - name: teacher
          in: query
          required: true
          description: Teacher ObjectId.
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c0d"
        - name: month
          in: query
          required: false
          description: Any date in the target month. Defaults to the current month.
          schema:
            type: string
            format: date
            example: "2026-04-01"
      responses:
        "200":
          description: Preview computed
          content:
            application/json:
              schema:
                type: object
                properties:
                  preview:
                    $ref: "#/components/schemas/SalaryPreview"
                  code: { type: string, example: salaryCalculated }
                  message: { type: string, example: "Oylik hisoblandi" }
              example:
                preview:
                  teacher:
                    _id: "664f1a2b3c4d5e6f7a8b9c0d"
                    firstName: "Sarvinoz"
                    lastName: "Yusupova"
                    phone: 998997654321
                    role: "teacher"
                  month: "2026-04-01T00:00:00.000Z"
                  groups:
                    - group: "664f1a2b3c4d5e6f7a8b9c10"
                      groupName: "Python — Oqshom 1"
                      salaryType: "percentage"
                      salaryValue: 30
                      studentCount: 12
                      paidStudentsCount: 10
                      groupRevenue: 4500000
                      amount: 1350000
                    - group: "664f1a2b3c4d5e6f7a8b9c11"
                      groupName: "Python — Kunduz 2"
                      salaryType: "per_student"
                      salaryValue: 50000
                      studentCount: 8
                      paidStudentsCount: 7
                      groupRevenue: 3150000
                      amount: 350000
                  totalAmount: 1700000
                  bonus: 0
                  deduction: 0
                  netAmount: 1700000
                code: salaryCalculated
                message: "Oylik hisoblandi"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingField:
                  value: { code: "missingField", message: "O'qituvchi ID kiritilishi shart" }
                notATeacher:
                  value: { code: "notATeacher", message: "Foydalanuvchi o'qituvchi emas" }
                invalidMonth:
                  value: { code: "invalidMonth", message: "Oy noto'g'ri kiritildi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Teacher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example: { code: "userNotFound", message: "Foydalanuvchi topilmadi" }
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /salaries/generate:
    post:
      tags: [Salaries]
      summary: Bulk-generate salaries for a month
      description: |
        Computes and persists salary records for **all teachers** (or the
        explicit subset in `teacherIds`) for the given month.

        For each teacher:
          - if no salary exists → a new one is **created** (`status = pending`).
          - if a salary exists and `overwrite = false` (default) → it is **skipped**
            and listed under `skipped[]`.
          - if a salary exists and `overwrite = true` → the breakdown and
            `totalAmount` are **rewritten** (existing `bonus`, `deduction`,
            and `paid` status are preserved).

        Always emits a `SALARY_CREATED` Record event per persisted salary.

        **Admin only.**
      operationId: generateSalaries
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalaryGenerateInput"
            examples:
              allTeachers:
                summary: Generate for every teacher
                value:
                  month: "2026-04-01"
              subset:
                summary: Generate for two specific teachers, overwrite if exists
                value:
                  month: "2026-04-01"
                  teacherIds:
                    - "664f1a2b3c4d5e6f7a8b9c0d"
                    - "664f1a2b3c4d5e6f7a8b9c0e"
                  overwrite: true
      responses:
        "201":
          description: Salaries generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated:
                    type: integer
                    description: Number of salaries persisted (created or overwritten)
                    example: 5
                  skipped:
                    type: array
                    description: Teachers whose salary already existed and were left untouched
                    items:
                      type: object
                      properties:
                        teacher:
                          type: string
                          example: "664f1a2b3c4d5e6f7a8b9c0d"
                        salaryId:
                          type: string
                          example: "664f1a2b3c4d5e6f7a8b9c60"
                        reason:
                          type: string
                          example: "exists"
                  salaries:
                    type: array
                    items:
                      $ref: "#/components/schemas/Salary"
                  code: { type: string, example: salariesGenerated }
                  message: { type: string, example: "Oyliklar shakllantirildi" }
        "400":
          description: Invalid month
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example: { code: "invalidMonth", message: "Oy noto'g'ri kiritildi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /salaries/{id}:
    get:
      tags: [Salaries]
      summary: Get one salary record
      description: |
        Returns a single salary with `teacher`, group breakdown groups
        (with populated `name`/`price`/`salaryType`/`salaryValue`), and `createdBy`.

        **Scope**: admins access any record; teachers only their own
        (`forbidden` otherwise).
      operationId: getSalary
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/salaryId"
      responses:
        "200":
          description: Salary found
          content:
            application/json:
              schema:
                type: object
                properties:
                  salary:
                    $ref: "#/components/schemas/Salary"
                  code: { type: string, example: salariesFound }
                  message: { type: string, example: "Oyliklar ro'yxati olindi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Salary not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example: { code: "salaryNotFound", message: "Oylik topilmadi" }
        "429":
          $ref: "#/components/responses/TooManyRequests"

    put:
      tags: [Salaries]
      summary: Update bonus / deduction / note / status
      description: |
        Partial update.

        - Updating `bonus` or `deduction` triggers `netAmount` recompute on the server.
        - Setting `status = "paid"` without `paidAt` makes the server stamp the current time.
        - Flipping `pending → paid` emits a `SALARY_PAID` Record event in addition to `SALARY_UPDATED`.

        **Admin only.**
      operationId: updateSalary
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/salaryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalaryUpdateInput"
            examples:
              addBonus:
                summary: Add a bonus
                value: { bonus: 250000, note: "Yaxshi ishlagani uchun" }
              markPaid:
                summary: Mark as paid
                value: { status: "paid" }
      responses:
        "200":
          description: Salary updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  salary:
                    $ref: "#/components/schemas/Salary"
                  code: { type: string, example: salaryUpdated }
                  message: { type: string, example: "Oylik yangilandi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Salary not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example: { code: "salaryNotFound", message: "Oylik topilmadi" }
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Salaries]
      summary: Delete a salary record
      description: |
        Removes a salary record permanently. A `SALARY_DELETED` Record is
        appended to the audit log.

        **Admin only.**
      operationId: deleteSalary
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/salaryId"
      responses:
        "200":
          description: Salary deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: string, example: salaryDeleted }
                  message: { type: string, example: "Oylik o'chirildi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Salary not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example: { code: "salaryNotFound", message: "Oylik topilmadi" }
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /salaries/{id}/pay:
    post:
      tags: [Salaries]
      summary: Mark a salary as paid
      description: |
        Convenience endpoint equivalent to:
        ```
        PUT /salaries/{id}
        { "status": "paid" }
        ```
        Sets `status = "paid"` and `paidAt = <now>`. Idempotent — calling it
        on an already-paid salary returns the existing record without changes.

        Emits a `SALARY_PAID` Record event on the first transition only.

        **Admin only.**
      operationId: paySalary
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/salaryId"
      responses:
        "200":
          description: Salary marked paid
          content:
            application/json:
              schema:
                type: object
                properties:
                  salary:
                    $ref: "#/components/schemas/Salary"
                  code: { type: string, example: salaryPaid }
                  message: { type: string, example: "Oylik to'landi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Salary not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example: { code: "salaryNotFound", message: "Oylik topilmadi" }
        "429":
          $ref: "#/components/responses/TooManyRequests"
