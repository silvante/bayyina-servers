openapi: 3.0.3

info:
  title: Bayyina CRM API
  description: |
    REST API for Bayyina CRM — an education center management system.

    ## Authentication
    All protected endpoints require a Bearer token in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```
    Tokens are obtained via `POST /api/auth/login` or `POST /api/auth/verify-otp`.
    Tokens expire after **30 days**.

    ## Roles
    | Role      | Description                                      |
    |-----------|--------------------------------------------------|
    | `admin`   | Full access to all resources                     |
    | `teacher` | Read access to students; manage groups/payments  |
    | `student` | Read-only access to own data                     |

    ## Error Format
    All errors follow this structure:
    ```json
    { "code": "errorCode", "message": "Human readable message" }
    ```

  version: 1.0.0
  contact:
    name: Mardonbek Khamidov
    email: mardonbek@bayyina.uz

servers:
  - url: http://localhost:4000/api
    description: Local development
  - url: https://api.bayyina.uz/api
    description: Production

tags:
  - name: Auth
    description: Authentication — login, OTP, and profile
  - name: Users
    description: User management (admin creates/manages teachers and students)
  - name: Groups
    description: Group management — each group defines a course name, price, teacher, and schedule
  - name: Enrollments
    description: Enrollment management — link students to groups and track per-student financial details (fee, discount, debt, balance)
  - name: Payments
    description: Payment management — record and track monthly payments for enrolled students
  - name: Attendance
    description: Attendance tracking — mark student presence on group session days (per the group's weekly schedule)
  - name: Leads
    description: |
      Lead management — track prospective students who showed interest but haven't enrolled yet.
      Leads have a unique referral link for attribution, a follow-up status, and optional scheduling.
      When a lead converts, flip `status` to `converted` and create an `Enrollment` via `POST /enrollments`.
  - name: Notifications
    description: |
      Notifications — students send messages tied to a group they are enrolled in (complaint,
      suggestion, question, other). Teachers see only notifications for groups they teach;
      admins see everything. Staff reply via an embedded `feedback` array on each notification
      (no separate module). The `role` of each feedback entry is always set by the server from
      the authenticated user's role and never trusted from the client.
  - name: Statistics
    description: |
      Analytics and reporting endpoints — **admin only**.

      All endpoints support optional date filtering via `startDate` and `endDate` query
      parameters (`YYYY-MM-DD`). When omitted, all-time data is returned (or last 6 months
      for trend series).

      Each response has the shape:
      ```json
      { "success": true, "data": { ... } }
      ```
  - name: Salaries
    description: |
      Teacher salary management — **admin only** (teachers can read their own).

      The system calculates teachers' monthly salaries from each group's
      configured `salaryType` and `salaryValue` (set on the Group resource).

      **Salary types**:
        - `percentage` — teacher earns a percentage of the group's monthly paid revenue.
          `amount = groupRevenue × salaryValue / 100`
        - `per_student` — teacher earns a fixed amount per paying student that month.
          `amount = paidStudentsCount × salaryValue`
        - `fixed` — teacher earns a flat monthly amount per group, regardless of attendance.
          `amount = salaryValue`

      A salary record stores a per-group breakdown plus optional admin-set
      `bonus` and `deduction`. The `netAmount` is always
      `totalAmount + bonus - deduction`.

      **Workflow**:
        1. `GET /salaries/calculate?teacher=<id>&month=YYYY-MM-01` — preview the computed amount without persisting.
        2. `POST /salaries/generate` — compute and persist salaries for all teachers (idempotent with `overwrite=true`).
        3. `PUT /salaries/{id}` or `POST /salaries/{id}/pay` — finalise as paid when the teacher receives money.

      Salary calculation only counts payments with `status = "paid"` whose
      `month` falls inside the salary record's month.
  - name: Records
    description: |
      Event timeline — **admin only**.

      An append-only log of every significant action in the study center:
      students created, leads moved through the pipeline, enrollments started/ended,
      payments taken or marked overdue, attendance marked, and more. Records are
      generated automatically by controllers and the overdue-payment job, and are
      never mutated after creation.

      Each record carries:
        - A human-readable **Uzbek `description`** (e.g. *"Mardonbek yangi o'quvchi Ali Valiyev ni qo'shdi"*).
        - A unique **`code`** in the format `REC-YYYYMMDD-NNNN` (daily counter, zero-padded) for easy citation.
        - An **`eventType`** enum for programmatic filtering (e.g. `LEAD_STATUS_CHANGED`, `ENROLLMENT_DROPPED`).
        - An **`actor`** snapshot (userId, role, name at the time of the event) — including
          `role: "system"` for records produced by cron jobs like `PAYMENT_OVERDUE`.
        - A **`refs`** object with all related IDs (leadId, studentId, teacherId, groupId,
          enrollmentId, paymentId, attendanceId) so the timeline can be filtered by any
          participant.
        - An optional **`changes`** object (`before`/`after` maps of only the fields that
          actually changed) for update events.
        - Optional **`metadata`** for extras (e.g. `{ from, to }` for status transitions,
          the populated `student` for payment/attendance events).

      Sorted by `createdAt` descending by default. Supports rich filtering — see
      `GET /records` query parameters.

# ─────────────────────────────────────────────
# Security scheme
# ─────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token issued on login or OTP verification. Valid for 30 days.

  # ─────────────────────────────────────────────
  # Reusable schemas
  # ─────────────────────────────────────────────
  schemas:

    # ── User ────────────────────────────────────
    User:
      type: object
      description: Full user object (password never returned)
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        firstName:
          type: string
          example: "Jasur"
        lastName:
          type: string
          example: "Toshmatov"
        phone:
          type: integer
          example: 998901234567
        role:
          type: string
          enum: [admin, teacher, student]
          example: "student"
        telegramId:
          type: string
          nullable: true
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          nullable: true
          example: "male"
        age:
          type: integer
          nullable: true
          example: 18
        source:
          type: string
          nullable: true
          description: How the student found out about the center
          example: "Instagram"
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T08:30:00.000Z"

    UserInput:
      type: object
      required: [firstName, lastName, phone, password]
      properties:
        firstName:
          type: string
          example: "Jasur"
        lastName:
          type: string
          example: "Toshmatov"
        phone:
          type: integer
          description: Uzbek phone number (9 digits after country code)
          example: 998901234567
        password:
          type: string
          minLength: 6
          example: "secret123"
        role:
          type: string
          enum: [teacher, student]
          default: "student"
          example: "student"
        telegramId:
          type: string
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          example: "male"
        age:
          type: integer
          minimum: 1
          example: 18
        source:
          type: string
          example: "Instagram"
        groupIds:
          type: array
          description: >
            List of group IDs. For `teacher` — the teacher is assigned to those groups.
            For `student` — an Enrollment is created for each group.
          items:
            type: string
          example: ["664f1a2b3c4d5e6f7a8b9c01", "664f1a2b3c4d5e6f7a8b9c02"]

    EnrollmentGroupSummary:
      type: object
      description: Subset of group fields returned inside a student's enrollment
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c10"
        name:
          type: string
          example: "Python — Oqshom 1"
        description:
          type: string
          nullable: true
          example: "Beginner Python evening group"
        price:
          type: number
          example: 450000
        schedule:
          type: object
          properties:
            days:
              type: array
              items:
                type: string
              example: ["Monday", "Wednesday", "Friday"]
            time:
              type: string
              example: "18:00"
        room:
          type: string
          nullable: true
          example: "Room 3"

    StudentEnrollment:
      type: object
      description: Enrollment record embedded inside a student object (student field is omitted)
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c20"
        group:
          $ref: "#/components/schemas/EnrollmentGroupSummary"
        status:
          type: string
          enum: [active, completed, dropped]
          example: "active"
        enrolledAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        monthlyFee:
          type: number
          example: 400000
        discount:
          type: number
          default: 0
          example: 50000
        discountReason:
          type: string
          nullable: true
          example: "Sibling discount"
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          example: 5
        lastPaymentDate:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-05T00:00:00.000Z"
        nextPaymentDate:
          type: string
          format: date-time
          nullable: true
          example: "2024-07-05T00:00:00.000Z"
        debt:
          type: number
          default: 0
          example: 0
        balance:
          type: number
          default: 0
          example: 20000
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T08:30:00.000Z"

    StudentWithEnrollments:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            enrollments:
              type: array
              description: All enrollments for this student with populated group data
              items:
                $ref: "#/components/schemas/StudentEnrollment"

    UserUpdateInput:
      type: object
      description: |
        Any user can update: `firstName`, `lastName`, `telegramId`, `gender`, `age`, `source`.
        Admin can additionally update: `role`, `password`.
      properties:
        firstName:
          type: string
          example: "Jasur"
        lastName:
          type: string
          example: "Toshmatov"
        telegramId:
          type: string
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          example: "female"
        age:
          type: integer
          example: 20
        source:
          type: string
          example: "Friend referral"
        role:
          type: string
          enum: [admin, teacher, student]
          description: Admin only
          example: "teacher"
        password:
          type: string
          minLength: 6
          description: Admin only
          example: "newpassword"

    # ── Group ────────────────────────────────────
    Group:
      type: object
      description: A group that defines a subject, price, teacher, and schedule
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c10"
        name:
          type: string
          example: "Python — Oqshom 1"
        description:
          type: string
          nullable: true
          example: "Boshlang'ich darajadan professional darajagacha"
        price:
          type: number
          description: Monthly fee in UZS
          example: 450000
        teacher:
          type: object
          description: Populated teacher (firstName, lastName, phone)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            firstName:
              type: string
              example: "Sarvinoz"
            lastName:
              type: string
              example: "Yusupova"
            phone:
              type: integer
              example: 998997654321
        schedule:
          type: object
          required: [time]
          properties:
            days:
              type: array
              items:
                type: string
                enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
              example: ["Monday", "Wednesday", "Friday"]
            time:
              type: string
              example: "09:00"
        room:
          type: string
          nullable: true
          example: "Room 3"
        salaryType:
          type: string
          enum: [percentage, per_student, fixed]
          default: percentage
          description: |
            How the teacher's pay is computed for this group:
              - `percentage` — % of paid revenue
              - `per_student` — fixed UZS per paying student
              - `fixed` — flat monthly amount
          example: "percentage"
        salaryValue:
          type: number
          default: 30
          description: |
            Numeric value paired with `salaryType`. For `percentage`, this is the
            percent (0–100). For `per_student` or `fixed`, this is the UZS amount.
          example: 30
        createdBy:
          type: string
          description: Admin user ID who created the group
          example: "664f1a2b3c4d5e6f7a8b9c0f"
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T08:30:00.000Z"

    GroupInput:
      type: object
      required: [name, price, teacher, schedule]
      properties:
        name:
          type: string
          example: "Python — Oqshom 1"
        description:
          type: string
          example: "Boshlang'ich darajadan professional darajagacha"
        price:
          type: number
          description: Monthly fee in UZS
          example: 450000
        teacher:
          type: string
          description: Teacher User ObjectId
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        schedule:
          type: object
          required: [time]
          properties:
            days:
              type: array
              items:
                type: string
                enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
              example: ["Monday", "Wednesday", "Friday"]
            time:
              type: string
              example: "09:00"
        room:
          type: string
          example: "Room 3"
        salaryType:
          type: string
          enum: [percentage, per_student, fixed]
          default: percentage
          example: "percentage"
        salaryValue:
          type: number
          default: 30
          example: 30

    GroupUpdateInput:
      type: object
      description: All fields are optional. Admin only.
      properties:
        name:
          type: string
          example: "Python — Kunduz 2"
        description:
          type: string
          example: "Yangilangan guruh"
        price:
          type: number
          example: 500000
        teacher:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        schedule:
          type: object
          properties:
            days:
              type: array
              items:
                type: string
                enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
              example: ["Tuesday", "Thursday"]
            time:
              type: string
              example: "11:00"
        room:
          type: string
          example: "Room 5"
        salaryType:
          type: string
          enum: [percentage, per_student, fixed]
          example: "per_student"
        salaryValue:
          type: number
          example: 50000

    # ── Enrollment ──────────────────────────────
    Enrollment:
      type: object
      description: A record that links a student to a group and tracks their payment details
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c20"
        student:
          type: object
          description: Populated student (firstName, lastName, phone)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            firstName:
              type: string
              example: "Jasur"
            lastName:
              type: string
              example: "Toshmatov"
            phone:
              type: integer
              example: 998901234567
        group:
          type: object
          description: Populated group (name, price, teacher)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c10"
            name:
              type: string
              example: "Python — Oqshom 1"
            price:
              type: number
              example: 450000
            teacher:
              type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c0f"
                firstName:
                  type: string
                  example: "Sarvinoz"
                lastName:
                  type: string
                  example: "Yusupova"
        status:
          type: string
          enum: [active, completed, dropped]
          default: active
          example: "active"
        enrolledAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        monthlyFee:
          type: number
          description: Per-student monthly fee (may differ from the group's default price)
          example: 400000
        discount:
          type: number
          default: 0
          description: Discount amount applied to the monthly fee
          example: 50000
        discountReason:
          type: string
          nullable: true
          example: "Sibling discount"
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          description: Day of the month the payment is due
          example: 5
        lastPaymentDate:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-05T00:00:00.000Z"
        nextPaymentDate:
          type: string
          format: date-time
          nullable: true
          example: "2024-07-05T00:00:00.000Z"
        debt:
          type: number
          default: 0
          description: Outstanding debt amount in UZS
          example: 0
        balance:
          type: number
          default: 0
          description: Prepaid/positive balance in UZS
          example: 100000
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T08:30:00.000Z"

    EnrollmentInput:
      type: object
      required: [student, group]
      properties:
        student:
          type: string
          description: MongoDB ObjectId of the student (User)
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        group:
          type: string
          description: MongoDB ObjectId of the group
          example: "664f1a2b3c4d5e6f7a8b9c10"
        monthlyFee:
          type: number
          description: Override monthly fee for this student (defaults to group price if omitted)
          example: 400000
        discount:
          type: number
          description: Discount amount in UZS
          example: 50000
        discountReason:
          type: string
          example: "Sibling discount"
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          example: 5
        lastPaymentDate:
          type: string
          format: date
          example: "2024-06-05"
        nextPaymentDate:
          type: string
          format: date
          example: "2024-07-05"
        debt:
          type: number
          default: 0
          example: 0
        balance:
          type: number
          default: 0
          example: 0

    EnrollmentUpdateInput:
      type: object
      description: All fields are optional. Partial update — only provided fields are changed.
      properties:
        status:
          type: string
          enum: [active, completed, dropped]
          example: "completed"
        monthlyFee:
          type: number
          example: 420000
        discount:
          type: number
          example: 30000
        discountReason:
          type: string
          example: "Loyalty discount"
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          example: 10
        lastPaymentDate:
          type: string
          format: date
          example: "2024-07-05"
        nextPaymentDate:
          type: string
          format: date
          example: "2024-08-05"
        debt:
          type: number
          example: 50000
        balance:
          type: number
          example: 0

    # ── Payment ──────────────────────────────────
    Payment:
      type: object
      description: A payment record for a student's monthly fee
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c30"
        enrollment:
          type: object
          description: Populated enrollment (group, status)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c20"
            group:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c10"
            status:
              type: string
              enum: [active, completed, dropped]
              example: "active"
        student:
          type: object
          description: Populated student (firstName, lastName, phone)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            firstName:
              type: string
              example: "Jasur"
            lastName:
              type: string
              example: "Toshmatov"
            phone:
              type: integer
              example: 998901234567
        amount:
          type: number
          description: Payment amount in UZS
          example: 450000
        month:
          type: string
          format: date-time
          description: The month this payment covers
          example: "2024-06-01T00:00:00.000Z"
        status:
          type: string
          enum: [paid, pending, overdue]
          default: pending
          example: "paid"
        paidAt:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-05T10:00:00.000Z"
        note:
          type: string
          nullable: true
          example: "Naqd to'landi"
        createdBy:
          type: object
          description: Populated user who recorded the payment
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0f"
            firstName:
              type: string
              example: "Sarvinoz"
            lastName:
              type: string
              example: "Yusupova"
        createdAt:
          type: string
          format: date-time
          example: "2024-06-05T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-05T10:00:00.000Z"

    PaymentInput:
      type: object
      required: [enrollment, student, amount, month]
      properties:
        enrollment:
          type: string
          description: MongoDB ObjectId of the enrollment
          example: "664f1a2b3c4d5e6f7a8b9c20"
        student:
          type: string
          description: MongoDB ObjectId of the student (User)
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        amount:
          type: number
          description: Payment amount in UZS (must be > 0)
          example: 450000
        month:
          type: string
          format: date
          description: The month this payment covers (ISO date string)
          example: "2024-06-01"
        note:
          type: string
          description: Optional note about the payment
          example: "Naqd to'landi"

    PaymentUpdateInput:
      type: object
      description: All fields are optional. Only `status`, `amount`, `note`, and `paidAt` can be updated.
      properties:
        status:
          type: string
          enum: [paid, pending, overdue]
          example: "paid"
        amount:
          type: number
          example: 450000
        note:
          type: string
          example: "Yangilangan izoh"
        paidAt:
          type: string
          format: date-time
          description: If status is set to `paid` and paidAt is omitted, it defaults to now
          example: "2024-06-10T09:00:00.000Z"

    # ── Attendance ───────────────────────────────
    Attendance:
      type: object
      description: A single attendance record for one student on one group session day
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c40"
        enrollment:
          type: string
          description: ObjectId of the enrollment the record belongs to
          example: "664f1a2b3c4d5e6f7a8b9c20"
        group:
          oneOf:
            - type: string
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c10"
                name:
                  type: string
                  example: "Python — Oqshom 1"
                schedule:
                  type: object
                  properties:
                    days:
                      type: array
                      items:
                        type: string
                        enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
                    time:
                      type: string
                      example: "18:00"
        student:
          oneOf:
            - type: string
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c0d"
                firstName:
                  type: string
                  example: "Jasur"
                lastName:
                  type: string
                  example: "Toshmatov"
                phone:
                  type: integer
                  example: 998901234567
        date:
          type: string
          format: date-time
          description: Session day normalised to 00:00:00 UTC
          example: "2026-04-13T00:00:00.000Z"
        status:
          type: string
          enum: [present, absent]
          example: "present"
        note:
          type: string
          nullable: true
          example: "Kech keldi"
        markedBy:
          type: string
          description: ObjectId of the teacher who marked the record
          example: "664f1a2b3c4d5e6f7a8b9c0f"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-13T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-13T10:00:00.000Z"

    AttendanceBulkInput:
      type: object
      required: [group, date, entries]
      properties:
        group:
          type: string
          description: ObjectId of the group the session belongs to
          example: "664f1a2b3c4d5e6f7a8b9c10"
        date:
          type: string
          format: date
          description: |
            Session date (YYYY-MM-DD). Must be a weekday listed in the group's `schedule.days`,
            otherwise the request is rejected with `invalidSessionDate`.
          example: "2026-04-13"
        entries:
          type: array
          description: One entry per enrollment being marked. Enrollments must belong to the group.
          items:
            type: object
            required: [enrollment, status]
            properties:
              enrollment:
                type: string
                example: "664f1a2b3c4d5e6f7a8b9c20"
              status:
                type: string
                enum: [present, absent]
                example: "present"
              note:
                type: string
                example: "Kech keldi"

    AttendanceUpdateInput:
      type: object
      description: Partial update — only provided fields are changed.
      properties:
        status:
          type: string
          enum: [present, absent]
          example: "absent"
        note:
          type: string
          example: "Kasal"

    AttendanceSessionRow:
      type: object
      description: |
        Per-enrollment row for a single session day. `status` is `null` when the
        enrollment has not yet been marked for this date.
      properties:
        enrollment:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c20"
        student:
          type: object
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            firstName:
              type: string
              example: "Jasur"
            lastName:
              type: string
              example: "Toshmatov"
            phone:
              type: integer
              example: 998901234567
        status:
          type: string
          enum: [present, absent]
          nullable: true
          example: "present"
        note:
          type: string
          nullable: true
          example: null
        attendanceId:
          type: string
          nullable: true
          description: ObjectId of the attendance record if one exists; null if unmarked
          example: "664f1a2b3c4d5e6f7a8b9c40"
        markedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-13T10:00:00.000Z"

    # ── Lead ─────────────────────────────────────
    Lead:
      type: object
      description: A prospective student — pre-enrollment record with contact info, source attribution, and follow-up status.
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c50"
        firstName:
          type: string
          description: Lead's first name (required)
          example: "Ali"
        phone:
          type: integer
          nullable: true
          description: Uzbek phone number (9 digits after country code)
          example: 998901234567
        telegramId:
          type: string
          nullable: true
          description: Telegram numeric user ID. Unique across all leads when set.
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          nullable: true
          example: "male"
        age:
          type: integer
          nullable: true
          minimum: 1
          maximum: 120
          example: 19
        profession:
          type: string
          nullable: true
          description: Current profession or occupation
          example: "Student"
        source:
          type: string
          enum: [telegram, instagram, referral, offline, other]
          default: other
          description: How the lead found out about the center
          example: "instagram"
        interest:
          type: string
          nullable: true
          description: Free-text note of what the lead is interested in
          example: "English evening course"
        uniqueLink:
          type: string
          description: Auto-generated slug (12 hex chars) for referral-click tracking. Returned on create; immutable.
          example: "a1b2c3d4e5f6"
        linkClickedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the first time the referral link was hit. Null until clicked.
          example: "2026-04-14T10:15:00.000Z"
        group:
          oneOf:
            - type: string
              nullable: true
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c10"
                name:
                  type: string
                  example: "English — Oqshom 1"
                price:
                  type: number
                  example: 450000
          description: Populated group the lead is interested in (optional)
        level:
          type: string
          nullable: true
          description: Desired level (free-text, e.g. "A1", "beginner")
          example: "A1"
        status:
          type: string
          enum: [new, contacted, interested, scheduled, converted, rejected]
          default: new
          description: |
            Follow-up status:
            - `new` — just came in
            - `contacted` — reached out
            - `interested` — engaged in conversation
            - `scheduled` — meeting/call booked (see `scheduledAt`)
            - `converted` — became a student (create Enrollment separately)
            - `rejected` — declined (see `rejectionReason`)
          example: "contacted"
        rejectionReason:
          type: string
          nullable: true
          description: Why the lead was rejected (required context when `status = rejected`)
          example: "Narx juda qimmat"
        paymentStatus:
          type: string
          enum: [unpaid, partial, paid]
          default: unpaid
          description: Whether any deposit/payment has been collected from this lead yet
          example: "unpaid"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
          description: Planned call/meeting timestamp
          example: "2026-04-20T14:00:00.000Z"
        lastActivityAt:
          type: string
          format: date-time
          description: Auto-bumped on any update or link-click
          example: "2026-04-14T10:15:00.000Z"
        notes:
          type: string
          nullable: true
          description: Free-text admin notes
          example: "Onasi qo'ng'iroq qildi, Payshanba kuni javob beramiz"
        createdBy:
          oneOf:
            - type: string
              nullable: true
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c0f"
                firstName:
                  type: string
                  example: "Sarvinoz"
                lastName:
                  type: string
                  example: "Yusupova"
          description: Admin/teacher who created the lead record
        createdAt:
          type: string
          format: date-time
          example: "2026-04-14T09:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-14T10:15:00.000Z"

    LeadInput:
      type: object
      required: [firstName]
      description: |
        Input for creating a lead. Only `firstName` is required.
        `uniqueLink`, `lastActivityAt`, `createdBy`, and timestamps are set by the server.
      properties:
        firstName:
          type: string
          example: "Ali"
        phone:
          type: integer
          example: 998901234567
        telegramId:
          type: string
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          example: "male"
        age:
          type: integer
          minimum: 1
          maximum: 120
          example: 19
        profession:
          type: string
          example: "Student"
        source:
          type: string
          enum: [telegram, instagram, referral, offline, other]
          default: other
          example: "telegram"
        interest:
          type: string
          example: "English evening course"
        group:
          type: string
          description: ObjectId of the Group the lead is interested in
          example: "664f1a2b3c4d5e6f7a8b9c10"
        level:
          type: string
          example: "A1"
        status:
          type: string
          enum: [new, contacted, interested, scheduled, converted, rejected]
          default: new
          example: "new"
        rejectionReason:
          type: string
          example: "Narx qimmat"
        paymentStatus:
          type: string
          enum: [unpaid, partial, paid]
          default: unpaid
          example: "unpaid"
        scheduledAt:
          type: string
          format: date-time
          example: "2026-04-20T14:00:00.000Z"
        notes:
          type: string
          example: "Telegram bot orqali kelgan"

    LeadUpdateInput:
      type: object
      description: |
        All fields are optional. Partial update — only provided fields are changed.
        `lastActivityAt` is automatically bumped to the current time on every update.
      properties:
        firstName:
          type: string
          example: "Ali"
        phone:
          type: integer
          example: 998901234567
        telegramId:
          type: string
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          example: "female"
        age:
          type: integer
          example: 20
        profession:
          type: string
          example: "Engineer"
        source:
          type: string
          enum: [telegram, instagram, referral, offline, other]
          example: "referral"
        interest:
          type: string
          example: "Korean A1 morning"
        group:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c10"
        level:
          type: string
          example: "B1"
        status:
          type: string
          enum: [new, contacted, interested, scheduled, converted, rejected]
          example: "scheduled"
        rejectionReason:
          type: string
          example: "Boshqa markazni tanladi"
        paymentStatus:
          type: string
          enum: [unpaid, partial, paid]
          example: "partial"
        scheduledAt:
          type: string
          format: date-time
          example: "2026-04-22T10:00:00.000Z"
        notes:
          type: string
          example: "Onasi qayta qo'ng'iroq qiladi"

    # ── Notification ─────────────────────────────
    NotificationFeedback:
      type: object
      description: |
        Single reply entry embedded inside a notification's `feedback` array.
        The `role` is assigned by the server from the authenticated user's role at write time.
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c20"
        role:
          type: string
          enum: [teacher, admin]
          example: "teacher"
        author:
          oneOf:
            - type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            - type: object
              properties:
                _id:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
        message:
          type: string
          example: "Qayd etildi, bugun o'qituvchi bilan gaplashamiz"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Notification:
      type: object
      description: Notification sent by a student, tied to a group, with an embedded feedback thread
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c30"
        group:
          oneOf:
            - type: string
              example: "664f1a2b3c4d5e6f7a8b9c10"
            - type: object
              properties:
                _id:
                  type: string
                name:
                  type: string
        sender:
          oneOf:
            - type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            - type: object
              properties:
                _id:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: integer
                role:
                  type: string
        title:
          type: string
          example: "Xona juda sovuq"
        message:
          type: string
          example: "Iltimos, isitgichni yoqsangiz"
        type:
          type: string
          enum: [complaint, suggestion, question, other]
          example: "complaint"
        status:
          type: string
          enum: [open, in_progress, resolved]
          example: "open"
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/NotificationFeedback"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NotificationInput:
      type: object
      required: [group, title, message]
      properties:
        group:
          type: string
          description: Group ObjectId. The student must be enrolled in this group.
          example: "664f1a2b3c4d5e6f7a8b9c10"
        title:
          type: string
          example: "Xona juda sovuq"
        message:
          type: string
          example: "Iltimos, isitgichni yoqsangiz"
        type:
          type: string
          enum: [complaint, suggestion, question, other]
          default: "other"
          example: "complaint"

    NotificationStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [open, in_progress, resolved]
          example: "in_progress"

    NotificationFeedbackInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: "Qayd etildi, bugun o'qituvchi bilan gaplashamiz"

    # ── Pagination ───────────────────────────────
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 42
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        totalPages:
          type: integer
          example: 5

    # ── Auth responses ───────────────────────────
    TokenResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          $ref: "#/components/schemas/User"
        code:
          type: string
          example: "loginSuccess"
        message:
          type: string
          example: "Hisobingizga kirdingiz"

    OtpSentResponse:
      type: object
      properties:
        code:
          type: string
          example: "codeSent"
        message:
          type: string
          example: "Tasdiqlash kodi yuborildi"
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        expiresAt:
          type: string
          format: date-time
          example: "2024-06-01T10:05:00.000Z"

    # ── Generic responses ────────────────────────
    SuccessMessage:
      type: object
      properties:
        code:
          type: string
          example: "userDeleted"
        message:
          type: string
          example: "Foydalanuvchi muvaffaqiyatli o'chirildi"

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: "invalidCredentials"
        message:
          type: string
          example: "Telefon raqam yoki parol noto'g'ri"

    # ── Record ──────────────────────────────────
    RecordEventType:
      type: string
      description: |
        The programmatic event type. Naming convention: `<ENTITY>_<ACTION>`.

        | Group         | Values                                                                                          |
        |---------------|-------------------------------------------------------------------------------------------------|
        | Users         | `USER_STUDENT_CREATED`, `USER_TEACHER_CREATED`, `USER_ADMIN_CREATED`, `USER_UPDATED`, `USER_DELETED` |
        | Leads         | `LEAD_CREATED`, `LEAD_UPDATED`, `LEAD_STATUS_CHANGED`, `LEAD_DELETED`, `LEAD_LINK_CLICKED`      |
        | Enrollments   | `ENROLLMENT_CREATED`, `ENROLLMENT_UPDATED`, `ENROLLMENT_COMPLETED`, `ENROLLMENT_DROPPED`, `ENROLLMENT_DELETED` |
        | Groups        | `GROUP_CREATED`, `GROUP_UPDATED`, `GROUP_DELETED`                                               |
        | Payments      | `PAYMENT_CREATED`, `PAYMENT_PAID`, `PAYMENT_OVERDUE`, `PAYMENT_UPDATED`, `PAYMENT_DELETED`      |
        | Attendance    | `ATTENDANCE_MARKED`, `ATTENDANCE_UPDATED`, `ATTENDANCE_DELETED`                                 |
      enum:
        - USER_STUDENT_CREATED
        - USER_TEACHER_CREATED
        - USER_ADMIN_CREATED
        - USER_UPDATED
        - USER_DELETED
        - LEAD_CREATED
        - LEAD_UPDATED
        - LEAD_STATUS_CHANGED
        - LEAD_DELETED
        - LEAD_LINK_CLICKED
        - ENROLLMENT_CREATED
        - ENROLLMENT_UPDATED
        - ENROLLMENT_COMPLETED
        - ENROLLMENT_DROPPED
        - ENROLLMENT_DELETED
        - GROUP_CREATED
        - GROUP_UPDATED
        - GROUP_DELETED
        - PAYMENT_CREATED
        - PAYMENT_PAID
        - PAYMENT_OVERDUE
        - PAYMENT_UPDATED
        - PAYMENT_DELETED
        - ATTENDANCE_MARKED
        - ATTENDANCE_UPDATED
        - ATTENDANCE_DELETED
      example: LEAD_STATUS_CHANGED

    RecordEntityType:
      type: string
      description: The type of primary entity this record concerns.
      enum: [Lead, User, Enrollment, Group, Payment, Attendance, System]
      example: Lead

    RecordActor:
      type: object
      description: |
        Snapshot of who performed the action, captured at event time.
        For records produced by scheduled jobs (e.g. `PAYMENT_OVERDUE`), the actor
        is `{ userId: null, role: "system", name: "Tizim" }`.
      properties:
        userId:
          type: string
          nullable: true
          description: ObjectId of the user who performed the action, or `null` for system events.
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        role:
          type: string
          enum: [admin, teacher, student, system]
          example: admin
        name:
          type: string
          description: Display name of the actor at the time of the event.
          example: "Mardonbek Khamidov"

    RecordRefs:
      type: object
      description: |
        All related entity IDs for this record. Populated based on event context;
        missing keys mean the relationship doesn't apply to this event.
        Used for fine-grained filtering (e.g. *"show every record mentioning student X"*).
      properties:
        leadId:       { type: string, nullable: true, example: "664f1a2b3c4d5e6f7a8b9c50" }
        studentId:    { type: string, nullable: true, example: "664f1a2b3c4d5e6f7a8b9c0d" }
        teacherId:    { type: string, nullable: true, example: "664f1a2b3c4d5e6f7a8b9c0e" }
        groupId:      { type: string, nullable: true, example: "664f1a2b3c4d5e6f7a8b9c10" }
        enrollmentId: { type: string, nullable: true, example: "664f1a2b3c4d5e6f7a8b9c20" }
        paymentId:    { type: string, nullable: true, example: "664f1a2b3c4d5e6f7a8b9c30" }
        attendanceId: { type: string, nullable: true, example: "664f1a2b3c4d5e6f7a8b9c40" }

    RecordChanges:
      type: object
      description: |
        Before/after diff for update events. Only fields that **actually changed**
        are included — unchanged fields are omitted. `null` represents an absent value.
        Absent entirely on non-update events.
      properties:
        before:
          type: object
          additionalProperties: true
          example: { status: "contacted", paymentStatus: "unpaid" }
        after:
          type: object
          additionalProperties: true
          example: { status: "converted", paymentStatus: "paid" }

    Record:
      type: object
      description: A single event-log entry. Immutable once written.
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9cAA"
        code:
          type: string
          description: |
            Unique human-readable code: `REC-YYYYMMDD-NNNN`.
            The 4-digit counter resets daily and is generated atomically, so codes
            are strictly increasing within a given day.
          example: "REC-20260418-0001"
        eventType:
          $ref: "#/components/schemas/RecordEventType"
        entityType:
          $ref: "#/components/schemas/RecordEntityType"
        entityId:
          type: string
          nullable: true
          description: ObjectId of the primary entity (lead, user, enrollment, group, payment, or attendance) this event concerns.
          example: "664f1a2b3c4d5e6f7a8b9c50"
        description:
          type: string
          description: |
            Human-readable Uzbek message built from the event type and entity snapshot.
            Safe to display as-is in the admin timeline UI.
          example: "\"Ali Valiyev\" murojaati holati: yangi → o'quvchiga aylantirildi"
        actor:
          $ref: "#/components/schemas/RecordActor"
        refs:
          $ref: "#/components/schemas/RecordRefs"
        changes:
          $ref: "#/components/schemas/RecordChanges"
        metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            Free-form extras specific to the event type. Common examples:
              - `LEAD_STATUS_CHANGED`: `{ from: "contacted", to: "converted" }`
              - `PAYMENT_*` / `ATTENDANCE_*`: `{ student: { _id, firstName, lastName } }`
          example:
            from: contacted
            to: converted
        createdAt:
          type: string
          format: date-time
          example: "2026-04-18T09:12:33.221Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-18T09:12:33.221Z"

    RecordsListResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/Record"
        total:
          type: integer
          example: 184
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 10
        hasNextPage:
          type: boolean
          example: true
        hasPrevPage:
          type: boolean
          example: false
        code:
          type: string
          example: recordsFound
        message:
          type: string
          example: "Yozuvlar ro'yxati olindi"

    RecordResponse:
      type: object
      properties:
        record:
          $ref: "#/components/schemas/Record"
        code:
          type: string
          example: recordsFound
        message:
          type: string
          example: "Yozuvlar ro'yxati olindi"

    # ── Salary ──────────────────────────────────
    SalaryGroupBreakdown:
      type: object
      description: |
        One row of a salary's per-group breakdown. Snapshotted at calculation
        time so the figures don't drift if a group's salary config changes later.
      properties:
        group:
          oneOf:
            - type: string
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c10"
                name:
                  type: string
                  example: "Python — Oqshom 1"
                price:
                  type: number
                  example: 450000
                salaryType:
                  type: string
                  enum: [percentage, per_student, fixed]
                  example: "percentage"
                salaryValue:
                  type: number
                  example: 30
        groupName:
          type: string
          description: Group name copied at calculation time
          example: "Python — Oqshom 1"
        salaryType:
          type: string
          enum: [percentage, per_student, fixed]
          example: "percentage"
        salaryValue:
          type: number
          example: 30
        studentCount:
          type: integer
          description: Number of `active` enrollments in this group at calculation time
          example: 12
        paidStudentsCount:
          type: integer
          description: Distinct students who paid for the salary's month
          example: 10
        groupRevenue:
          type: number
          description: Sum of `paid` payment amounts in the salary's month for this group (UZS)
          example: 4500000
        amount:
          type: number
          description: Salary amount earned from this group (UZS, rounded to integer)
          example: 1350000

    Salary:
      type: object
      description: A teacher's monthly salary record with a per-group breakdown
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c60"
        teacher:
          oneOf:
            - type: string
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c0d"
                firstName:
                  type: string
                  example: "Sarvinoz"
                lastName:
                  type: string
                  example: "Yusupova"
                phone:
                  type: integer
                  example: 998997654321
        month:
          type: string
          format: date-time
          description: |
            First UTC millisecond of the month the salary covers. The server
            normalises any incoming `month` value to the start of its month
            (so `2026-04-15` and `2026-04-01` both resolve to the April record).
          example: "2026-04-01T00:00:00.000Z"
        groups:
          type: array
          description: Per-group breakdown of how the salary was computed
          items:
            $ref: "#/components/schemas/SalaryGroupBreakdown"
        totalAmount:
          type: number
          description: Sum of `groups[].amount` (UZS, rounded)
          example: 3200000
        bonus:
          type: number
          default: 0
          description: Optional admin-set bonus added to `totalAmount` (UZS)
          example: 200000
        deduction:
          type: number
          default: 0
          description: Optional admin-set deduction subtracted from `totalAmount` (UZS)
          example: 0
        netAmount:
          type: number
          description: |
            Final payable amount: `totalAmount + bonus - deduction`. Re-derived
            by the server on every `PUT` — clients should not send it.
          example: 3400000
        status:
          type: string
          enum: [pending, paid]
          default: pending
          example: "pending"
        paidAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when status flipped to `paid`. Auto-set by `POST /salaries/{id}/pay`.
          example: "2026-05-03T10:00:00.000Z"
        note:
          type: string
          nullable: true
          example: "Naqd to'landi"
        createdBy:
          oneOf:
            - type: string
              nullable: true
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c0f"
                firstName:
                  type: string
                  example: "Mardonbek"
                lastName:
                  type: string
                  example: "Khamidov"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-30T22:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-05-03T10:00:00.000Z"

    SalaryInput:
      type: object
      required: [teacher, month]
      description: |
        Manually create a single salary record. The server auto-computes
        `groups[]`, `totalAmount`, and `netAmount` from the teacher's groups
        and that month's paid payments. The provided `bonus` / `deduction`
        are folded into `netAmount`.
      properties:
        teacher:
          type: string
          description: ObjectId of the teacher (User with `role = teacher`)
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        month:
          type: string
          format: date
          description: |
            Any date inside the target month. The server normalises to the
            first day of that month in UTC.
          example: "2026-04-01"
        bonus:
          type: number
          default: 0
          example: 200000
        deduction:
          type: number
          default: 0
          example: 0
        note:
          type: string
          example: "Aprel oyligi — naqd"

    SalaryUpdateInput:
      type: object
      description: |
        Partial update — only provided fields are changed. `netAmount` is
        recomputed from `totalAmount + bonus - deduction` on every update.
        Setting `status = "paid"` without `paidAt` makes the server stamp the
        current time.
      properties:
        bonus:
          type: number
          example: 250000
        deduction:
          type: number
          example: 50000
        note:
          type: string
          example: "Bonus qo'shildi"
        status:
          type: string
          enum: [pending, paid]
          example: "paid"
        paidAt:
          type: string
          format: date-time
          example: "2026-05-03T10:00:00.000Z"

    SalaryGenerateInput:
      type: object
      required: [month]
      description: |
        Bulk-generate salary records for one or more teachers in a given month.
        For each target teacher, the server computes the breakdown and:
          - **creates** a new salary if none exists for that month,
          - **skips** the teacher if a salary already exists *and* `overwrite=false`,
          - **rewrites** the breakdown/`totalAmount` (preserving any existing
            `bonus`, `deduction`, and `paid` status) if `overwrite=true`.
      properties:
        month:
          type: string
          format: date
          description: Any date in the target month — server normalises to the 1st.
          example: "2026-04-01"
        teacherIds:
          type: array
          description: Optional subset of teacher ObjectIds. Omit to target all teachers.
          items:
            type: string
          example: ["664f1a2b3c4d5e6f7a8b9c0d", "664f1a2b3c4d5e6f7a8b9c0e"]
        overwrite:
          type: boolean
          default: false
          description: If `true`, recompute and overwrite any existing salary record for the month.
          example: false

    SalaryPreview:
      type: object
      description: |
        Preview of a teacher's salary for a month — same shape as a `Salary`
        document but **not persisted**. Use it for "what-if" or pre-check UIs.
      properties:
        teacher:
          $ref: "#/components/schemas/User"
        month:
          type: string
          format: date-time
          example: "2026-04-01T00:00:00.000Z"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/SalaryGroupBreakdown"
        totalAmount:
          type: number
          example: 3200000
        bonus:
          type: number
          example: 0
        deduction:
          type: number
          example: 0
        netAmount:
          type: number
          example: 3200000

  # ─────────────────────────────────────────────
  # Reusable parameters
  # ─────────────────────────────────────────────
  parameters:
    userId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the user
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c0d"

    groupId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the group
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c10"

    enrollmentId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the enrollment
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c20"

    paymentId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the payment
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c30"

    attendanceId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the attendance record
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c40"

    leadId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the lead
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c50"

    leadUniqueLink:
      name: uniqueLink
      in: path
      required: true
      description: The lead's auto-generated 12-char hex slug
      schema:
        type: string
        example: "a1b2c3d4e5f6"

    notificationId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the notification
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c30"

    notificationFeedbackId:
      name: feedbackId
      in: path
      required: true
      description: MongoDB ObjectId of the feedback entry inside the notification's `feedback` array
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c20"

    salaryId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the salary record
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c60"

    pageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number (1-based)

    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
      description: Number of results per page (default 20, max 100)

    recordIdOrCode:
      name: id
      in: path
      required: true
      description: |
        Either the MongoDB ObjectId of the record **or** its human-readable code
        (format `REC-YYYYMMDD-NNNN`). The server disambiguates by format.
      schema:
        type: string
        example: "REC-20260418-0001"

    recordEntityType:
      name: entityType
      in: path
      required: true
      description: Entity type whose timeline should be fetched.
      schema:
        type: string
        enum: [Lead, User, Enrollment, Group, Payment, Attendance, Salary, System]
        example: Enrollment

    recordEntityId:
      name: entityId
      in: path
      required: true
      description: ObjectId of the entity whose timeline should be fetched.
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c20"

  # ─────────────────────────────────────────────
  # Reusable responses
  # ─────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            tokenMissing:
              summary: No token provided
              value: { code: "tokenMissing", message: "Token mavjud emas" }
            tokenExpired:
              summary: Token has expired
              value: { code: "tokenExpired", message: "Token muddati tugagan" }
            invalidToken:
              summary: Token is malformed
              value: { code: "invalidToken", message: "Yaroqsiz token kiritildi" }

    Forbidden:
      description: Authenticated but insufficient role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "forbidden"
            message: "Ruxsat berilmadi"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "userNotFound"
            message: "Foydalanuvchi topilmadi"

    BadRequest:
      description: Validation error or bad input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    TooManyRequests:
      description: Rate limit exceeded (120 req / 3 min)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "tooManyRequests"
            message: "Juda ko'p so'rovlar. Iltimos, 3 daqiqadan keyin urinib ko'ring"

    startDate:
      name: startDate
      in: query
      required: false
      description: Filter start date (inclusive). Format `YYYY-MM-DD`. Parsed as UTC midnight.
      schema:
        type: string
        format: date
        example: "2026-01-01"

    endDate:
      name: endDate
      in: query
      required: false
      description: Filter end date (inclusive). Format `YYYY-MM-DD`. Parsed as UTC end-of-day.
      schema:
        type: string
        format: date
        example: "2026-04-30"

# ═════════════════════════════════════════════
# PATHS
# ═════════════════════════════════════════════
paths:

  # ══════════════════════════════════════════
  # AUTH
  # ══════════════════════════════════════════

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with phone and password
      description: |
        Authenticates a user using their phone number and password.
        Returns a JWT token valid for **30 days** and the user object (without password).
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, password]
              properties:
                phone:
                  type: integer
                  example: 998901234567
                password:
                  type: string
                  minLength: 6
                  example: "secret123"
            example:
              phone: 998901234567
              password: "secret123"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid phone, password too short, or wrong credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidPhone:
                  value: { code: "invalidPhone", message: "Telefon raqam noto'g'ri" }
                invalidPassword:
                  value: { code: "invalidPassword", message: "Parol juda ham qisqa" }
                invalidCredentials:
                  value: { code: "invalidCredentials", message: "Telefon raqam yoki parol noto'g'ri" }
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/send-otp:
    post:
      tags: [Auth]
      summary: Send OTP code to a phone number
      description: |
        Sends a 6-digit one-time password (OTP) to the given phone number.
        The OTP is valid for **5 minutes**. If a code was already sent within the last
        60 seconds the existing code info is returned instead of sending a new one.
      operationId: sendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: integer
                  example: 998901234567
      responses:
        "200":
          description: OTP sent (or already sent recently)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSentResponse"
              examples:
                codeSent:
                  summary: New code sent
                  value:
                    code: "codeSent"
                    message: "Tasdiqlash kodi yuborildi"
                    createdAt: "2024-06-01T10:00:00.000Z"
                    expiresAt: "2024-06-01T10:05:00.000Z"
                codeAlreadySent:
                  summary: Code already sent within last 60s
                  value:
                    code: "codeAlreadySent"
                    message: "Kod allaqachon yuborilgan"
                    createdAt: "2024-06-01T10:00:00.000Z"
                    expiresAt: "2024-06-01T10:05:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and receive a JWT token
      description: |
        Validates the 6-digit OTP against the phone number.
        Returns a JWT token and user object on success.

        **OTP expires after 5 minutes.**
      operationId: verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: integer
                  example: 998901234567
                code:
                  type: integer
                  description: 6-digit OTP received via SMS/Telegram
                  example: 482931
      responses:
        "200":
          description: OTP verified — token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: OTP invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                codeInvalid:
                  value: { code: "codeInvalid", message: "Kod noto'g'ri" }
                codeExpired:
                  value: { code: "codeExpired", message: "Kod muddati tugagan, qayta yuboring" }
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get current authenticated user's profile
      description: Returns the full profile of the user associated with the Bearer token.
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Profile returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  code:
                    type: string
                    example: "profileSuccess"
                  message:
                    type: string
                    example: "Profil ma'lumotlari olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ══════════════════════════════════════════
  # USERS
  # ══════════════════════════════════════════

  /users:
    get:
      tags: [Users]
      summary: List users
      description: |
        Returns a paginated list of users.

        **Access rules:**
        - `admin` — sees all users; can filter by `role`
        - `teacher` — sees students only (role filter ignored)
        - `student` — sees only themselves
      operationId: getUsers
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - name: role
          in: query
          description: Filter by role (admin only)
          schema:
            type: string
            enum: [admin, teacher, student]
          example: "student"
      responses:
        "200":
          description: Users returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  total:
                    type: integer
                    example: 42
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 3
                  hasNextPage:
                    type: boolean
                    example: true
                  hasPrevPage:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: "usersFound"
                  message:
                    type: string
                    example: "Foydalanuvchilar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Users]
      summary: Create a user
      description: |
        Creates a new `teacher` or `student` account.

        **Access:** Admin only.

        **Role-specific requirements:**
        - `student` — optionally provide `groupIds` (array); an Enrollment is created for each group.
        - `teacher` — optionally provide `groupIds` (array); the teacher is assigned to those groups.
      operationId: createUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
            examples:
              createStudent:
                summary: Create a student
                value:
                  firstName: "Jasur"
                  lastName: "Toshmatov"
                  phone: 998901234567
                  password: "secret123"
                  role: "student"
                  groupIds: ["664f1a2b3c4d5e6f7a8b9c01", "664f1a2b3c4d5e6f7a8b9c02"]
                  gender: "male"
                  age: 18
                  source: "Instagram"
              createTeacher:
                summary: Create a teacher
                value:
                  firstName: "Sarvinoz"
                  lastName: "Yusupova"
                  phone: 998997654321
                  password: "teacher456"
                  role: "teacher"
                  groupIds: ["664f1a2b3c4d5e6f7a8b9c01", "664f1a2b3c4d5e6f7a8b9c02"]
      responses:
        "201":
          description: User created successfully. For `student` role the `user` object includes an `enrollments` array with populated group data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    oneOf:
                      - $ref: "#/components/schemas/StudentWithEnrollments"
                      - $ref: "#/components/schemas/User"
                    description: For students, includes `enrollments` array; for teachers, plain user object.
                  code:
                    type: string
                    example: "userCreated"
                  message:
                    type: string
                    example: "Foydalanuvchi muvaffaqiyatli yaratildi"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingName:
                  value: { code: "missingField", message: "Ism va Familiya kiritilishi shart" }
                invalidPhone:
                  value: { code: "invalidPhone", message: "Telefon raqam noto'g'ri" }
                phoneUsed:
                  value: { code: "phoneAlreadyUsed", message: "Telefon raqam allaqachon ishlatilgan" }
                groupNotFound:
                  value: { code: "groupNotFound", message: "Bir yoki bir nechta guruh topilmadi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /users/teachers:
    get:
      tags: [Users]
      summary: List all teachers
      description: |
        Returns a paginated list of users with role `teacher`.

        **Access:** Admin only.

        Default page size is **20**.
      operationId: getTeachers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (1-based)
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Number of results per page (default 20, max 100)
      responses:
        "200":
          description: Teachers returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  total:
                    type: integer
                    example: 5
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 1
                  hasNextPage:
                    type: boolean
                    example: false
                  hasPrevPage:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: "usersFound"
                  message:
                    type: string
                    example: "Foydalanuvchilar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /users/students:
    get:
      tags: [Users]
      summary: List all students
      description: |
        Returns a paginated list of users with role `student`.
        Each student includes their `enrollments` array, where each enrollment
        has the linked `group` populated (name, description, price, schedule, room).

        **Access:** Admin only.

        Default page size is **20**.
      operationId: getStudents
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: Page number (1-based)
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
          description: Number of results per page (default 20, max 100)
      responses:
        "200":
          description: Students returned with their enrollments and populated group data
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/StudentWithEnrollments"
                  total:
                    type: integer
                    example: 38
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 2
                  hasNextPage:
                    type: boolean
                    example: true
                  hasPrevPage:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: "usersFound"
                  message:
                    type: string
                    example: "Foydalanuvchilar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
