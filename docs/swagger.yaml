openapi: 3.0.3

info:
  title: Bayyina CRM API
  description: |
    REST API for Bayyina CRM — an education center management system.

    ## Authentication
    All protected endpoints require a Bearer token in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```
    Tokens are obtained via `POST /api/auth/login` or `POST /api/auth/verify-otp`.
    Tokens expire after **30 days**.

    ## Roles
    | Role      | Description                                      |
    |-----------|--------------------------------------------------|
    | `admin`   | Full access to all resources                     |
    | `teacher` | Read access to students; manage groups/payments  |
    | `student` | Read-only access to own data                     |

    ## Error Format
    All errors follow this structure:
    ```json
    { "code": "errorCode", "message": "Human readable message" }
    ```

  version: 1.0.0
  contact:
    name: Mardonbek Khamidov
    email: mardonbek@bayyina.uz

servers:
  - url: http://localhost:4000/api
    description: Local development
  - url: https://api.bayyina.uz/api
    description: Production

tags:
  - name: Auth
    description: Authentication — login, OTP, and profile
  - name: Users
    description: User management (admin creates/manages teachers and students)
  - name: Groups
    description: Group management — each group defines a course name, price, teacher, and schedule
  - name: Enrollments
    description: Enrollment management — link students to groups and track per-student financial details (fee, discount, debt, balance)
  - name: Payments
    description: Payment management — record and track monthly payments for enrolled students
  - name: Attendance
    description: Attendance tracking — mark student presence on group session days (per the group's weekly schedule)
  - name: Leads
    description: |
      Lead management — track prospective students who showed interest but haven't enrolled yet.
      Leads have a unique referral link for attribution, a follow-up status, and optional scheduling.
      When a lead converts, flip `status` to `converted` and create an `Enrollment` via `POST /enrollments`.
  - name: Notifications
    description: |
      Notifications — students send messages tied to a group they are enrolled in (complaint,
      suggestion, question, other). Teachers see only notifications for groups they teach;
      admins see everything. Staff reply via an embedded `feedback` array on each notification
      (no separate module). The `role` of each feedback entry is always set by the server from
      the authenticated user's role and never trusted from the client.

# ─────────────────────────────────────────────
# Security scheme
# ─────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token issued on login or OTP verification. Valid for 30 days.

  # ─────────────────────────────────────────────
  # Reusable schemas
  # ─────────────────────────────────────────────
  schemas:

    # ── User ────────────────────────────────────
    User:
      type: object
      description: Full user object (password never returned)
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        firstName:
          type: string
          example: "Jasur"
        lastName:
          type: string
          example: "Toshmatov"
        phone:
          type: integer
          example: 998901234567
        role:
          type: string
          enum: [admin, teacher, student]
          example: "student"
        telegramId:
          type: string
          nullable: true
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          nullable: true
          example: "male"
        age:
          type: integer
          nullable: true
          example: 18
        source:
          type: string
          nullable: true
          description: How the student found out about the center
          example: "Instagram"
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T08:30:00.000Z"

    UserInput:
      type: object
      required: [firstName, lastName, phone, password]
      properties:
        firstName:
          type: string
          example: "Jasur"
        lastName:
          type: string
          example: "Toshmatov"
        phone:
          type: integer
          description: Uzbek phone number (9 digits after country code)
          example: 998901234567
        password:
          type: string
          minLength: 6
          example: "secret123"
        role:
          type: string
          enum: [teacher, student]
          default: "student"
          example: "student"
        telegramId:
          type: string
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          example: "male"
        age:
          type: integer
          minimum: 1
          example: 18
        source:
          type: string
          example: "Instagram"
        groupIds:
          type: array
          description: >
            List of group IDs. For `teacher` — the teacher is assigned to those groups.
            For `student` — an Enrollment is created for each group.
          items:
            type: string
          example: ["664f1a2b3c4d5e6f7a8b9c01", "664f1a2b3c4d5e6f7a8b9c02"]

    EnrollmentGroupSummary:
      type: object
      description: Subset of group fields returned inside a student's enrollment
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c10"
        name:
          type: string
          example: "Python — Oqshom 1"
        description:
          type: string
          nullable: true
          example: "Beginner Python evening group"
        price:
          type: number
          example: 450000
        schedule:
          type: object
          properties:
            days:
              type: array
              items:
                type: string
              example: ["Monday", "Wednesday", "Friday"]
            time:
              type: string
              example: "18:00"
        room:
          type: string
          nullable: true
          example: "Room 3"

    StudentEnrollment:
      type: object
      description: Enrollment record embedded inside a student object (student field is omitted)
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c20"
        group:
          $ref: "#/components/schemas/EnrollmentGroupSummary"
        status:
          type: string
          enum: [active, completed, dropped]
          example: "active"
        enrolledAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        monthlyFee:
          type: number
          example: 400000
        discount:
          type: number
          default: 0
          example: 50000
        discountReason:
          type: string
          nullable: true
          example: "Sibling discount"
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          example: 5
        lastPaymentDate:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-05T00:00:00.000Z"
        nextPaymentDate:
          type: string
          format: date-time
          nullable: true
          example: "2024-07-05T00:00:00.000Z"
        debt:
          type: number
          default: 0
          example: 0
        balance:
          type: number
          default: 0
          example: 20000
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T08:30:00.000Z"

    StudentWithEnrollments:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            enrollments:
              type: array
              description: All enrollments for this student with populated group data
              items:
                $ref: "#/components/schemas/StudentEnrollment"

    UserUpdateInput:
      type: object
      description: |
        Any user can update: `firstName`, `lastName`, `telegramId`, `gender`, `age`, `source`.
        Admin can additionally update: `role`, `password`.
      properties:
        firstName:
          type: string
          example: "Jasur"
        lastName:
          type: string
          example: "Toshmatov"
        telegramId:
          type: string
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          example: "female"
        age:
          type: integer
          example: 20
        source:
          type: string
          example: "Friend referral"
        role:
          type: string
          enum: [admin, teacher, student]
          description: Admin only
          example: "teacher"
        password:
          type: string
          minLength: 6
          description: Admin only
          example: "newpassword"

    # ── Group ────────────────────────────────────
    Group:
      type: object
      description: A group that defines a subject, price, teacher, and schedule
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c10"
        name:
          type: string
          example: "Python — Oqshom 1"
        description:
          type: string
          nullable: true
          example: "Boshlang'ich darajadan professional darajagacha"
        price:
          type: number
          description: Monthly fee in UZS
          example: 450000
        teacher:
          type: object
          description: Populated teacher (firstName, lastName, phone)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            firstName:
              type: string
              example: "Sarvinoz"
            lastName:
              type: string
              example: "Yusupova"
            phone:
              type: integer
              example: 998997654321
        schedule:
          type: object
          required: [time]
          properties:
            days:
              type: array
              items:
                type: string
                enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
              example: ["Monday", "Wednesday", "Friday"]
            time:
              type: string
              example: "09:00"
        room:
          type: string
          nullable: true
          example: "Room 3"
        createdBy:
          type: string
          description: Admin user ID who created the group
          example: "664f1a2b3c4d5e6f7a8b9c0f"
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T08:30:00.000Z"

    GroupInput:
      type: object
      required: [name, price, teacher, schedule]
      properties:
        name:
          type: string
          example: "Python — Oqshom 1"
        description:
          type: string
          example: "Boshlang'ich darajadan professional darajagacha"
        price:
          type: number
          description: Monthly fee in UZS
          example: 450000
        teacher:
          type: string
          description: Teacher User ObjectId
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        schedule:
          type: object
          required: [time]
          properties:
            days:
              type: array
              items:
                type: string
                enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
              example: ["Monday", "Wednesday", "Friday"]
            time:
              type: string
              example: "09:00"
        room:
          type: string
          example: "Room 3"

    GroupUpdateInput:
      type: object
      description: All fields are optional. Admin only.
      properties:
        name:
          type: string
          example: "Python — Kunduz 2"
        description:
          type: string
          example: "Yangilangan guruh"
        price:
          type: number
          example: 500000
        teacher:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        schedule:
          type: object
          properties:
            days:
              type: array
              items:
                type: string
                enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
              example: ["Tuesday", "Thursday"]
            time:
              type: string
              example: "11:00"
        room:
          type: string
          example: "Room 5"

    # ── Enrollment ──────────────────────────────
    Enrollment:
      type: object
      description: A record that links a student to a group and tracks their payment details
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c20"
        student:
          type: object
          description: Populated student (firstName, lastName, phone)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            firstName:
              type: string
              example: "Jasur"
            lastName:
              type: string
              example: "Toshmatov"
            phone:
              type: integer
              example: 998901234567
        group:
          type: object
          description: Populated group (name, price, teacher)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c10"
            name:
              type: string
              example: "Python — Oqshom 1"
            price:
              type: number
              example: 450000
            teacher:
              type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c0f"
                firstName:
                  type: string
                  example: "Sarvinoz"
                lastName:
                  type: string
                  example: "Yusupova"
        status:
          type: string
          enum: [active, completed, dropped]
          default: active
          example: "active"
        enrolledAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        monthlyFee:
          type: number
          description: Per-student monthly fee (may differ from the group's default price)
          example: 400000
        discount:
          type: number
          default: 0
          description: Discount amount applied to the monthly fee
          example: 50000
        discountReason:
          type: string
          nullable: true
          example: "Sibling discount"
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          description: Day of the month the payment is due
          example: 5
        lastPaymentDate:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-05T00:00:00.000Z"
        nextPaymentDate:
          type: string
          format: date-time
          nullable: true
          example: "2024-07-05T00:00:00.000Z"
        debt:
          type: number
          default: 0
          description: Outstanding debt amount in UZS
          example: 0
        balance:
          type: number
          default: 0
          description: Prepaid/positive balance in UZS
          example: 100000
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-10T08:30:00.000Z"

    EnrollmentInput:
      type: object
      required: [student, group]
      properties:
        student:
          type: string
          description: MongoDB ObjectId of the student (User)
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        group:
          type: string
          description: MongoDB ObjectId of the group
          example: "664f1a2b3c4d5e6f7a8b9c10"
        monthlyFee:
          type: number
          description: Override monthly fee for this student (defaults to group price if omitted)
          example: 400000
        discount:
          type: number
          description: Discount amount in UZS
          example: 50000
        discountReason:
          type: string
          example: "Sibling discount"
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          example: 5
        lastPaymentDate:
          type: string
          format: date
          example: "2024-06-05"
        nextPaymentDate:
          type: string
          format: date
          example: "2024-07-05"
        debt:
          type: number
          default: 0
          example: 0
        balance:
          type: number
          default: 0
          example: 0

    EnrollmentUpdateInput:
      type: object
      description: All fields are optional. Partial update — only provided fields are changed.
      properties:
        status:
          type: string
          enum: [active, completed, dropped]
          example: "completed"
        monthlyFee:
          type: number
          example: 420000
        discount:
          type: number
          example: 30000
        discountReason:
          type: string
          example: "Loyalty discount"
        paymentDay:
          type: integer
          minimum: 1
          maximum: 31
          example: 10
        lastPaymentDate:
          type: string
          format: date
          example: "2024-07-05"
        nextPaymentDate:
          type: string
          format: date
          example: "2024-08-05"
        debt:
          type: number
          example: 50000
        balance:
          type: number
          example: 0

    # ── Payment ──────────────────────────────────
    Payment:
      type: object
      description: A payment record for a student's monthly fee
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c30"
        enrollment:
          type: object
          description: Populated enrollment (group, status)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c20"
            group:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c10"
            status:
              type: string
              enum: [active, completed, dropped]
              example: "active"
        student:
          type: object
          description: Populated student (firstName, lastName, phone)
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            firstName:
              type: string
              example: "Jasur"
            lastName:
              type: string
              example: "Toshmatov"
            phone:
              type: integer
              example: 998901234567
        amount:
          type: number
          description: Payment amount in UZS
          example: 450000
        month:
          type: string
          format: date-time
          description: The month this payment covers
          example: "2024-06-01T00:00:00.000Z"
        status:
          type: string
          enum: [paid, pending, overdue]
          default: pending
          example: "paid"
        paidAt:
          type: string
          format: date-time
          nullable: true
          example: "2024-06-05T10:00:00.000Z"
        note:
          type: string
          nullable: true
          example: "Naqd to'landi"
        createdBy:
          type: object
          description: Populated user who recorded the payment
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0f"
            firstName:
              type: string
              example: "Sarvinoz"
            lastName:
              type: string
              example: "Yusupova"
        createdAt:
          type: string
          format: date-time
          example: "2024-06-05T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2024-06-05T10:00:00.000Z"

    PaymentInput:
      type: object
      required: [enrollment, student, amount, month]
      properties:
        enrollment:
          type: string
          description: MongoDB ObjectId of the enrollment
          example: "664f1a2b3c4d5e6f7a8b9c20"
        student:
          type: string
          description: MongoDB ObjectId of the student (User)
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        amount:
          type: number
          description: Payment amount in UZS (must be > 0)
          example: 450000
        month:
          type: string
          format: date
          description: The month this payment covers (ISO date string)
          example: "2024-06-01"
        note:
          type: string
          description: Optional note about the payment
          example: "Naqd to'landi"

    PaymentUpdateInput:
      type: object
      description: All fields are optional. Only `status`, `amount`, `note`, and `paidAt` can be updated.
      properties:
        status:
          type: string
          enum: [paid, pending, overdue]
          example: "paid"
        amount:
          type: number
          example: 450000
        note:
          type: string
          example: "Yangilangan izoh"
        paidAt:
          type: string
          format: date-time
          description: If status is set to `paid` and paidAt is omitted, it defaults to now
          example: "2024-06-10T09:00:00.000Z"

    # ── Attendance ───────────────────────────────
    Attendance:
      type: object
      description: A single attendance record for one student on one group session day
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c40"
        enrollment:
          type: string
          description: ObjectId of the enrollment the record belongs to
          example: "664f1a2b3c4d5e6f7a8b9c20"
        group:
          oneOf:
            - type: string
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c10"
                name:
                  type: string
                  example: "Python — Oqshom 1"
                schedule:
                  type: object
                  properties:
                    days:
                      type: array
                      items:
                        type: string
                        enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
                    time:
                      type: string
                      example: "18:00"
        student:
          oneOf:
            - type: string
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c0d"
                firstName:
                  type: string
                  example: "Jasur"
                lastName:
                  type: string
                  example: "Toshmatov"
                phone:
                  type: integer
                  example: 998901234567
        date:
          type: string
          format: date-time
          description: Session day normalised to 00:00:00 UTC
          example: "2026-04-13T00:00:00.000Z"
        status:
          type: string
          enum: [present, absent]
          example: "present"
        note:
          type: string
          nullable: true
          example: "Kech keldi"
        markedBy:
          type: string
          description: ObjectId of the teacher who marked the record
          example: "664f1a2b3c4d5e6f7a8b9c0f"
        createdAt:
          type: string
          format: date-time
          example: "2026-04-13T10:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-13T10:00:00.000Z"

    AttendanceBulkInput:
      type: object
      required: [group, date, entries]
      properties:
        group:
          type: string
          description: ObjectId of the group the session belongs to
          example: "664f1a2b3c4d5e6f7a8b9c10"
        date:
          type: string
          format: date
          description: |
            Session date (YYYY-MM-DD). Must be a weekday listed in the group's `schedule.days`,
            otherwise the request is rejected with `invalidSessionDate`.
          example: "2026-04-13"
        entries:
          type: array
          description: One entry per enrollment being marked. Enrollments must belong to the group.
          items:
            type: object
            required: [enrollment, status]
            properties:
              enrollment:
                type: string
                example: "664f1a2b3c4d5e6f7a8b9c20"
              status:
                type: string
                enum: [present, absent]
                example: "present"
              note:
                type: string
                example: "Kech keldi"

    AttendanceUpdateInput:
      type: object
      description: Partial update — only provided fields are changed.
      properties:
        status:
          type: string
          enum: [present, absent]
          example: "absent"
        note:
          type: string
          example: "Kasal"

    AttendanceSessionRow:
      type: object
      description: |
        Per-enrollment row for a single session day. `status` is `null` when the
        enrollment has not yet been marked for this date.
      properties:
        enrollment:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c20"
        student:
          type: object
          properties:
            _id:
              type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            firstName:
              type: string
              example: "Jasur"
            lastName:
              type: string
              example: "Toshmatov"
            phone:
              type: integer
              example: 998901234567
        status:
          type: string
          enum: [present, absent]
          nullable: true
          example: "present"
        note:
          type: string
          nullable: true
          example: null
        attendanceId:
          type: string
          nullable: true
          description: ObjectId of the attendance record if one exists; null if unmarked
          example: "664f1a2b3c4d5e6f7a8b9c40"
        markedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-04-13T10:00:00.000Z"

    # ── Lead ─────────────────────────────────────
    Lead:
      type: object
      description: A prospective student — pre-enrollment record with contact info, source attribution, and follow-up status.
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c50"
        firstName:
          type: string
          description: Lead's first name (required)
          example: "Ali"
        phone:
          type: integer
          nullable: true
          description: Uzbek phone number (9 digits after country code)
          example: 998901234567
        telegramId:
          type: string
          nullable: true
          description: Telegram numeric user ID. Unique across all leads when set.
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          nullable: true
          example: "male"
        age:
          type: integer
          nullable: true
          minimum: 1
          maximum: 120
          example: 19
        profession:
          type: string
          nullable: true
          description: Current profession or occupation
          example: "Student"
        source:
          type: string
          enum: [telegram, instagram, referral, offline, other]
          default: other
          description: How the lead found out about the center
          example: "instagram"
        interest:
          type: string
          nullable: true
          description: Free-text note of what the lead is interested in
          example: "English evening course"
        uniqueLink:
          type: string
          description: Auto-generated slug (12 hex chars) for referral-click tracking. Returned on create; immutable.
          example: "a1b2c3d4e5f6"
        linkClickedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the first time the referral link was hit. Null until clicked.
          example: "2026-04-14T10:15:00.000Z"
        group:
          oneOf:
            - type: string
              nullable: true
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c10"
                name:
                  type: string
                  example: "English — Oqshom 1"
                price:
                  type: number
                  example: 450000
          description: Populated group the lead is interested in (optional)
        level:
          type: string
          nullable: true
          description: Desired level (free-text, e.g. "A1", "beginner")
          example: "A1"
        status:
          type: string
          enum: [new, contacted, interested, scheduled, converted, rejected]
          default: new
          description: |
            Follow-up status:
            - `new` — just came in
            - `contacted` — reached out
            - `interested` — engaged in conversation
            - `scheduled` — meeting/call booked (see `scheduledAt`)
            - `converted` — became a student (create Enrollment separately)
            - `rejected` — declined (see `rejectionReason`)
          example: "contacted"
        rejectionReason:
          type: string
          nullable: true
          description: Why the lead was rejected (required context when `status = rejected`)
          example: "Narx juda qimmat"
        paymentStatus:
          type: string
          enum: [unpaid, partial, paid]
          default: unpaid
          description: Whether any deposit/payment has been collected from this lead yet
          example: "unpaid"
        scheduledAt:
          type: string
          format: date-time
          nullable: true
          description: Planned call/meeting timestamp
          example: "2026-04-20T14:00:00.000Z"
        lastActivityAt:
          type: string
          format: date-time
          description: Auto-bumped on any update or link-click
          example: "2026-04-14T10:15:00.000Z"
        notes:
          type: string
          nullable: true
          description: Free-text admin notes
          example: "Onasi qo'ng'iroq qildi, Payshanba kuni javob beramiz"
        createdBy:
          oneOf:
            - type: string
              nullable: true
            - type: object
              properties:
                _id:
                  type: string
                  example: "664f1a2b3c4d5e6f7a8b9c0f"
                firstName:
                  type: string
                  example: "Sarvinoz"
                lastName:
                  type: string
                  example: "Yusupova"
          description: Admin/teacher who created the lead record
        createdAt:
          type: string
          format: date-time
          example: "2026-04-14T09:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-14T10:15:00.000Z"

    LeadInput:
      type: object
      required: [firstName]
      description: |
        Input for creating a lead. Only `firstName` is required.
        `uniqueLink`, `lastActivityAt`, `createdBy`, and timestamps are set by the server.
      properties:
        firstName:
          type: string
          example: "Ali"
        phone:
          type: integer
          example: 998901234567
        telegramId:
          type: string
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          example: "male"
        age:
          type: integer
          minimum: 1
          maximum: 120
          example: 19
        profession:
          type: string
          example: "Student"
        source:
          type: string
          enum: [telegram, instagram, referral, offline, other]
          default: other
          example: "telegram"
        interest:
          type: string
          example: "English evening course"
        group:
          type: string
          description: ObjectId of the Group the lead is interested in
          example: "664f1a2b3c4d5e6f7a8b9c10"
        level:
          type: string
          example: "A1"
        status:
          type: string
          enum: [new, contacted, interested, scheduled, converted, rejected]
          default: new
          example: "new"
        rejectionReason:
          type: string
          example: "Narx qimmat"
        paymentStatus:
          type: string
          enum: [unpaid, partial, paid]
          default: unpaid
          example: "unpaid"
        scheduledAt:
          type: string
          format: date-time
          example: "2026-04-20T14:00:00.000Z"
        notes:
          type: string
          example: "Telegram bot orqali kelgan"

    LeadUpdateInput:
      type: object
      description: |
        All fields are optional. Partial update — only provided fields are changed.
        `lastActivityAt` is automatically bumped to the current time on every update.
      properties:
        firstName:
          type: string
          example: "Ali"
        phone:
          type: integer
          example: 998901234567
        telegramId:
          type: string
          example: "123456789"
        gender:
          type: string
          enum: [male, female]
          example: "female"
        age:
          type: integer
          example: 20
        profession:
          type: string
          example: "Engineer"
        source:
          type: string
          enum: [telegram, instagram, referral, offline, other]
          example: "referral"
        interest:
          type: string
          example: "Korean A1 morning"
        group:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c10"
        level:
          type: string
          example: "B1"
        status:
          type: string
          enum: [new, contacted, interested, scheduled, converted, rejected]
          example: "scheduled"
        rejectionReason:
          type: string
          example: "Boshqa markazni tanladi"
        paymentStatus:
          type: string
          enum: [unpaid, partial, paid]
          example: "partial"
        scheduledAt:
          type: string
          format: date-time
          example: "2026-04-22T10:00:00.000Z"
        notes:
          type: string
          example: "Onasi qayta qo'ng'iroq qiladi"

    # ── Notification ─────────────────────────────
    NotificationFeedback:
      type: object
      description: |
        Single reply entry embedded inside a notification's `feedback` array.
        The `role` is assigned by the server from the authenticated user's role at write time.
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c20"
        role:
          type: string
          enum: [teacher, admin]
          example: "teacher"
        author:
          oneOf:
            - type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            - type: object
              properties:
                _id:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
        message:
          type: string
          example: "Qayd etildi, bugun o'qituvchi bilan gaplashamiz"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Notification:
      type: object
      description: Notification sent by a student, tied to a group, with an embedded feedback thread
      properties:
        _id:
          type: string
          example: "664f1a2b3c4d5e6f7a8b9c30"
        group:
          oneOf:
            - type: string
              example: "664f1a2b3c4d5e6f7a8b9c10"
            - type: object
              properties:
                _id:
                  type: string
                name:
                  type: string
        sender:
          oneOf:
            - type: string
              example: "664f1a2b3c4d5e6f7a8b9c0d"
            - type: object
              properties:
                _id:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: integer
                role:
                  type: string
        title:
          type: string
          example: "Xona juda sovuq"
        message:
          type: string
          example: "Iltimos, isitgichni yoqsangiz"
        type:
          type: string
          enum: [complaint, suggestion, question, other]
          example: "complaint"
        status:
          type: string
          enum: [open, in_progress, resolved]
          example: "open"
        feedback:
          type: array
          items:
            $ref: "#/components/schemas/NotificationFeedback"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    NotificationInput:
      type: object
      required: [group, title, message]
      properties:
        group:
          type: string
          description: Group ObjectId. The student must be enrolled in this group.
          example: "664f1a2b3c4d5e6f7a8b9c10"
        title:
          type: string
          example: "Xona juda sovuq"
        message:
          type: string
          example: "Iltimos, isitgichni yoqsangiz"
        type:
          type: string
          enum: [complaint, suggestion, question, other]
          default: "other"
          example: "complaint"

    NotificationStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [open, in_progress, resolved]
          example: "in_progress"

    NotificationFeedbackInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: "Qayd etildi, bugun o'qituvchi bilan gaplashamiz"

    # ── Pagination ───────────────────────────────
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          example: 42
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        totalPages:
          type: integer
          example: 5

    # ── Auth responses ───────────────────────────
    TokenResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          $ref: "#/components/schemas/User"
        code:
          type: string
          example: "loginSuccess"
        message:
          type: string
          example: "Hisobingizga kirdingiz"

    OtpSentResponse:
      type: object
      properties:
        code:
          type: string
          example: "codeSent"
        message:
          type: string
          example: "Tasdiqlash kodi yuborildi"
        createdAt:
          type: string
          format: date-time
          example: "2024-06-01T10:00:00.000Z"
        expiresAt:
          type: string
          format: date-time
          example: "2024-06-01T10:05:00.000Z"

    # ── Generic responses ────────────────────────
    SuccessMessage:
      type: object
      properties:
        code:
          type: string
          example: "userDeleted"
        message:
          type: string
          example: "Foydalanuvchi muvaffaqiyatli o'chirildi"

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: "invalidCredentials"
        message:
          type: string
          example: "Telefon raqam yoki parol noto'g'ri"

  # ─────────────────────────────────────────────
  # Reusable parameters
  # ─────────────────────────────────────────────
  parameters:
    userId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the user
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c0d"

    groupId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the group
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c10"

    enrollmentId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the enrollment
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c20"

    paymentId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the payment
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c30"

    attendanceId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the attendance record
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c40"

    leadId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the lead
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c50"

    leadUniqueLink:
      name: uniqueLink
      in: path
      required: true
      description: The lead's auto-generated 12-char hex slug
      schema:
        type: string
        example: "a1b2c3d4e5f6"

    notificationId:
      name: id
      in: path
      required: true
      description: MongoDB ObjectId of the notification
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c30"

    notificationFeedbackId:
      name: feedbackId
      in: path
      required: true
      description: MongoDB ObjectId of the feedback entry inside the notification's `feedback` array
      schema:
        type: string
        example: "664f1a2b3c4d5e6f7a8b9c20"

    pageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
      description: Page number (1-based)

    limitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
      description: Number of results per page (default 20, max 100)

  # ─────────────────────────────────────────────
  # Reusable responses
  # ─────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            tokenMissing:
              summary: No token provided
              value: { code: "tokenMissing", message: "Token mavjud emas" }
            tokenExpired:
              summary: Token has expired
              value: { code: "tokenExpired", message: "Token muddati tugagan" }
            invalidToken:
              summary: Token is malformed
              value: { code: "invalidToken", message: "Yaroqsiz token kiritildi" }

    Forbidden:
      description: Authenticated but insufficient role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "forbidden"
            message: "Ruxsat berilmadi"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "userNotFound"
            message: "Foydalanuvchi topilmadi"

    BadRequest:
      description: Validation error or bad input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    TooManyRequests:
      description: Rate limit exceeded (120 req / 3 min)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: "tooManyRequests"
            message: "Juda ko'p so'rovlar. Iltimos, 3 daqiqadan keyin urinib ko'ring"

# ═════════════════════════════════════════════
# PATHS
# ═════════════════════════════════════════════
paths:

  # ══════════════════════════════════════════
  # AUTH
  # ══════════════════════════════════════════

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with phone and password
      description: |
        Authenticates a user using their phone number and password.
        Returns a JWT token valid for **30 days** and the user object (without password).
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, password]
              properties:
                phone:
                  type: integer
                  example: 998901234567
                password:
                  type: string
                  minLength: 6
                  example: "secret123"
            example:
              phone: 998901234567
              password: "secret123"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid phone, password too short, or wrong credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidPhone:
                  value: { code: "invalidPhone", message: "Telefon raqam noto'g'ri" }
                invalidPassword:
                  value: { code: "invalidPassword", message: "Parol juda ham qisqa" }
                invalidCredentials:
                  value: { code: "invalidCredentials", message: "Telefon raqam yoki parol noto'g'ri" }
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/send-otp:
    post:
      tags: [Auth]
      summary: Send OTP code to a phone number
      description: |
        Sends a 6-digit one-time password (OTP) to the given phone number.
        The OTP is valid for **5 minutes**. If a code was already sent within the last
        60 seconds the existing code info is returned instead of sending a new one.
      operationId: sendOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: integer
                  example: 998901234567
      responses:
        "200":
          description: OTP sent (or already sent recently)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSentResponse"
              examples:
                codeSent:
                  summary: New code sent
                  value:
                    code: "codeSent"
                    message: "Tasdiqlash kodi yuborildi"
                    createdAt: "2024-06-01T10:00:00.000Z"
                    expiresAt: "2024-06-01T10:05:00.000Z"
                codeAlreadySent:
                  summary: Code already sent within last 60s
                  value:
                    code: "codeAlreadySent"
                    message: "Kod allaqachon yuborilgan"
                    createdAt: "2024-06-01T10:00:00.000Z"
                    expiresAt: "2024-06-01T10:05:00.000Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and receive a JWT token
      description: |
        Validates the 6-digit OTP against the phone number.
        Returns a JWT token and user object on success.

        **OTP expires after 5 minutes.**
      operationId: verifyOtp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone:
                  type: integer
                  example: 998901234567
                code:
                  type: integer
                  description: 6-digit OTP received via SMS/Telegram
                  example: 482931
      responses:
        "200":
          description: OTP verified — token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: OTP invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                codeInvalid:
                  value: { code: "codeInvalid", message: "Kod noto'g'ri" }
                codeExpired:
                  value: { code: "codeExpired", message: "Kod muddati tugagan, qayta yuboring" }
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get current authenticated user's profile
      description: Returns the full profile of the user associated with the Bearer token.
      operationId: getProfile
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Profile returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  code:
                    type: string
                    example: "profileSuccess"
                  message:
                    type: string
                    example: "Profil ma'lumotlari olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ══════════════════════════════════════════
  # USERS
  # ══════════════════════════════════════════

  /users:
    get:
      tags: [Users]
      summary: List users
      description: |
        Returns a paginated list of users.

        **Access rules:**
        - `admin` — sees all users; can filter by `role`
        - `teacher` — sees students only (role filter ignored)
        - `student` — sees only themselves
      operationId: getUsers
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - name: role
          in: query
          description: Filter by role (admin only)
          schema:
            type: string
            enum: [admin, teacher, student]
          example: "student"
      responses:
        "200":
          description: Users returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                  total:
                    type: integer
                    example: 42
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 3
                  hasNextPage:
                    type: boolean
                    example: true
                  hasPrevPage:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: "usersFound"
                  message:
                    type: string
                    example: "Foydalanuvchilar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Users]
      summary: Create a user
      description: |
        Creates a new `teacher` or `student` account.

        **Access:** Admin only.

        **Role-specific requirements:**
        - `student` — optionally provide `groupIds` (array); an Enrollment is created for each group.
        - `teacher` — optionally provide `groupIds` (array); the teacher is assigned to those groups.
      operationId: createUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
            examples:
              createStudent:
                summary: Create a student
                value:
                  firstName: "Jasur"
                  lastName: "Toshmatov"
                  phone: 998901234567
                  password: "secret123"
                  role: "student"
                  groupIds: ["664f1a2b3c4d5e6f7a8b9c01", "664f1a2b3c4d5e6f7a8b9c02"]
                  gender: "male"
                  age: 18
                  source: "Instagram"
              createTeacher:
                summary: Create a teacher
                value:
                  firstName: "Sarvinoz"
                  lastName: "Yusupova"
                  phone: 998997654321
                  password: "teacher456"
                  role: "teacher"
