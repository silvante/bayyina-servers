      tags: [Groups]
      summary: List groups
      description: |
        Returns a paginated list of groups.

        **Access rules:**
        - `admin` — sees all groups
        - `teacher` — sees only their own groups (filter applied automatically)
      operationId: getGroups
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
      responses:
        "200":
          description: Groups returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"
                  total:
                    type: integer
                    example: 8
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 10
                  totalPages:
                    type: integer
                    example: 1
                  code:
                    type: string
                    example: "groupsFound"
                  message:
                    type: string
                    example: "Guruhlar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Groups]
      summary: Create a group
      description: |
        Creates a new group.

        **Access:** Admin only.

        `name`, `price`, `teacher`, and `schedule` (with `time`) are required. `description`, `schedule.days`, and `room` are optional.
      operationId: createGroup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
            examples:
              basicGroup:
                summary: Minimal group
                value:
                  name: "Python — Oqshom 1"
                  price: 450000
                  teacher: "664f1a2b3c4d5e6f7a8b9c0d"
                  schedule:
                    time: "09:00"
              fullGroup:
                summary: Group with full schedule
                value:
                  name: "Python — Kunduz 2"
                  description: "Boshlang'ich darajadan professional darajagacha"
                  price: 450000
                  teacher: "664f1a2b3c4d5e6f7a8b9c0d"
                  schedule:
                    days: ["Monday", "Wednesday", "Friday"]
                    time: "09:00"
                  room: "Room 3"
      responses:
        "201":
          description: Group created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: "#/components/schemas/Group"
                  code:
                    type: string
                    example: "groupCreated"
                  message:
                    type: string
                    example: "Guruh muvaffaqiyatli yaratildi"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingName:
                  value: { code: "missingField", message: "Guruh nomi kiritilishi shart" }
                missingPrice:
                  value: { code: "missingField", message: "Narx kiritilishi shart" }
                missingTeacher:
                  value: { code: "missingField", message: "O'qituvchi kiritilishi shart" }
                missingSchedule:
                  value: { code: "missingField", message: "Dars jadvali kiritilishi shart" }
                missingTime:
                  value: { code: "missingField", message: "Dars vaqti kiritilishi shart" }
                invalidDay:
                  value: { code: "invalidField", message: "Noto'g'ri kun kiritildi. Faqat haftaning kunlari qabul qilinadi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /groups/{id}:
    get:
      tags: [Groups]
      summary: Get a group by ID
      description: |
        Returns a single group populated with teacher details.

        **Access rules:**
        - `admin` — can access any group
        - `teacher` — can only access their own group (returns 403 otherwise)
      operationId: getGroup
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/groupId"
      responses:
        "200":
          description: Group found
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: "#/components/schemas/Group"
                  code:
                    type: string
                    example: "groupsFound"
                  message:
                    type: string
                    example: "Guruhlar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "groupNotFound"
                message: "Guruh topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    put:
      tags: [Groups]
      summary: Update a group
      description: |
        Updates one or more fields of an existing group.

        **Access:** Admin only.

        Updatable fields: `name`, `description`, `price`, `teacher`, `schedule`, `room`.
      operationId: updateGroup
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/groupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdateInput"
            examples:
              changeTeacher:
                summary: Reassign teacher
                value:
                  teacher: "664f1a2b3c4d5e6f7a8b9c0d"
              reschedule:
                summary: Update schedule and room
                value:
                  schedule:
                    days: ["Tuesday", "Thursday"]
                    time: "14:00"
                  room: "Room 7"
      responses:
        "200":
          description: Group updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: "#/components/schemas/Group"
                  code:
                    type: string
                    example: "groupUpdated"
                  message:
                    type: string
                    example: "Guruh muvaffaqiyatli yangilandi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "groupNotFound"
                message: "Guruh topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Groups]
      summary: Delete a group
      description: |
        Permanently deletes a group by ID.

        **Access:** Admin only.

        > **Warning:** This does not cascade-delete related Enrollments or Payments.
