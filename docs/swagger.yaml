  # ══════════════════════════════════════════
  # ENROLLMENTS
  # ══════════════════════════════════════════

  /enrollments:
    get:
      tags: [Enrollments]
      summary: List enrollments
      description: |
        Returns a paginated, filterable list of enrollments populated with student and group details.

        **Access rules:**
        - `admin` / `teacher` — can list all enrollments; supports filtering by `group`, `student`, and `status`
        - `student` — always sees only their own enrollments (any `student` query param is ignored)
      operationId: getEnrollments
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - name: group
          in: query
          description: Filter by group ObjectId
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c10"
        - name: student
          in: query
          description: Filter by student ObjectId (admin/teacher only; ignored for student role)
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c0d"
        - name: status
          in: query
          description: Filter by enrollment status
          schema:
            type: string
            enum: [active, completed, dropped]
            example: "active"
      responses:
        "200":
          description: Enrollments returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrollments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Enrollment"
                  total:
                    type: integer
                    example: 24
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 2
                  hasNextPage:
                    type: boolean
                    example: true
                  hasPrevPage:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: "enrollmentsFound"
                  message:
                    type: string
                    example: "Yozilishlar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Enrollments]
      summary: Create an enrollment
      description: |
        Enrolls a student into a group.

        **Access:** Admin, Teacher.

        Prevents duplicate active enrollments — if the student already has an `active` enrollment
        in the same group, the request is rejected with `alreadyEnrolled`.

        `monthlyFee`, `discount`, `discountReason`, `paymentDay`, `lastPaymentDate`,
        `nextPaymentDate`, `debt`, and `balance` are all optional financial fields.
      operationId: createEnrollment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentInput"
            examples:
              minimal:
                summary: Minimal enrollment (student + group only)
                value:
                  student: "664f1a2b3c4d5e6f7a8b9c0d"
                  group: "664f1a2b3c4d5e6f7a8b9c10"
              withFinancials:
                summary: Enrollment with custom fee and payment schedule
                value:
                  student: "664f1a2b3c4d5e6f7a8b9c0d"
                  group: "664f1a2b3c4d5e6f7a8b9c10"
                  monthlyFee: 400000
                  discount: 50000
                  discountReason: "Sibling discount"
                  paymentDay: 5
                  nextPaymentDate: "2024-07-05"
      responses:
        "201":
          description: Enrollment created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrollment:
                    $ref: "#/components/schemas/Enrollment"
                  code:
                    type: string
                    example: "enrollmentCreated"
                  message:
                    type: string
                    example: "O'quvchi guruhga yozildi"
        "400":
          description: Validation error or duplicate enrollment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingStudent:
                  value: { code: "missingField", message: "O'quvchi kiritilishi shart" }
                missingGroup:
                  value: { code: "missingField", message: "Guruh kiritilishi shart" }
                alreadyEnrolled:
                  value: { code: "alreadyEnrolled", message: "O'quvchi bu guruhda allaqachon faol" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /enrollments/{id}:
    get:
      tags: [Enrollments]
      summary: Get an enrollment by ID
      description: |
        Returns a single enrollment fully populated with student and group (including teacher) details.

        **Access rules:**
        - `admin` / `teacher` — can fetch any enrollment
        - `student` — can only fetch their own enrollment; returns `403` if the enrollment belongs to another student
      operationId: getEnrollment
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/enrollmentId"
      responses:
        "200":
          description: Enrollment found
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrollment:
                    $ref: "#/components/schemas/Enrollment"
                  code:
                    type: string
                    example: "enrollmentsFound"
                  message:
                    type: string
                    example: "Yozilish topildi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Student trying to access another student's enrollment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "forbidden"
                message: "Ruxsat berilmadi"
        "404":
          description: Enrollment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "enrollmentNotFound"
                message: "Yozilish topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    put:
      tags: [Enrollments]
      summary: Update an enrollment
      description: |
        Updates an enrollment's status and/or financial fields. All fields are optional — only
        provided fields are changed.

        **Access:** Admin, Teacher.

        **Allowed status transitions:**
        - `active` → `completed` (student finished the course)
        - `active` → `dropped` (student left early)
        - Any status → `active` (re-activate)
      operationId: updateEnrollment
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/enrollmentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollmentUpdateInput"
            examples:
              dropStudent:
                summary: Mark student as dropped
                value:
                  status: "dropped"
              updateFeeAndDebt:
                summary: Update monthly fee and clear debt
                value:
                  monthlyFee: 420000
                  debt: 0
                  balance: 50000
              recordPayment:
                summary: Record a payment cycle
                value:
                  lastPaymentDate: "2024-07-05"
                  nextPaymentDate: "2024-08-05"
                  debt: 0
      responses:
        "200":
          description: Enrollment updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrollment:
                    $ref: "#/components/schemas/Enrollment"
                  code:
                    type: string
                    example: "enrollmentUpdated"
                  message:
                    type: string
                    example: "Yozilish yangilandi"
        "400":
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "invalidStatus"
                message: "Status noto'g'ri"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Enrollment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "enrollmentNotFound"
                message: "Yozilish topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Enrollments]
      summary: Delete an enrollment
      description: |
        Permanently deletes an enrollment record by ID.

        **Access:** Admin only.

        > **Warning:** This permanently removes the enrollment and its payment history link.
        > Consider updating the status to `dropped` instead of deleting.
      operationId: deleteEnrollment
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/enrollmentId"
      responses:
        "200":
          description: Enrollment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                code: "enrollmentDeleted"
                message: "Yozilish o'chirildi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Enrollment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "enrollmentNotFound"
                message: "Yozilish topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ══════════════════════════════════════════
  # PAYMENTS
  # ══════════════════════════════════════════

  /payments:
    get:
      tags: [Payments]
      summary: List payments
      description: |
        Returns a paginated list of payment records.

        **Access:**
        - `admin` / `teacher` — can filter by `student`, `enrollment`, or `status`
        - `student` — automatically scoped to their own payments only

        Sorted by `month` descending (most recent first).
      operationId: getPayments
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - name: enrollment
          in: query
          schema:
            type: string
          description: Filter by enrollment ObjectId
          example: "664f1a2b3c4d5e6f7a8b9c20"
        - name: student
          in: query
          schema:
            type: string
          description: Filter by student ObjectId (admin/teacher only; students are auto-scoped)
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        - name: status
          in: query
          schema:
            type: string
            enum: [paid, pending, overdue]
          description: Filter by payment status
          example: "paid"
      responses:
        "200":
          description: Payments returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Payment"
                  total:
                    type: integer
                    example: 30
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 2
                  hasNextPage:
                    type: boolean
                    example: true
                  hasPrevPage:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: "paymentsFound"
                  message:
                    type: string
                    example: "To'lovlar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Payments]
      summary: Record a payment
      description: |
        Creates a new payment record. `status` is automatically set to `paid` and `paidAt` is set to the current time.

        **Validation:**
        - Enrollment must exist and its `status` must be `"active"` — otherwise `400 enrollmentNotActive`
        - Only one `paid` payment is allowed per enrollment per calendar month — otherwise `400 duplicatePayment`

        **Effective fee calculation:**
        ```
        effectiveFee  = group.price − enrollment.discount
        totalAvailable = enrollment.balance + amount
        ```

        **Side effects on the linked Enrollment** (based on `totalAvailable` vs `effectiveFee`):

        | Case | `nextPaymentDate` | `debt` | `balance` |
        |------|-------------------|--------|-----------|
        | `totalAvailable === effectiveFee` | Advances by 1 month (clamped to last day) | 0 | 0 |
        | `totalAvailable < effectiveFee` | Unchanged | `effectiveFee − totalAvailable` | 0 |
        | `totalAvailable > effectiveFee` | Advances by 1 month (clamped to last day) | 0 | `totalAvailable − effectiveFee` |

        `lastPaymentDate` and `paymentDay` are always updated.

        **Access:** Admin, Teacher.
      operationId: createPayment
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInput"
            example:
              enrollment: "664f1a2b3c4d5e6f7a8b9c20"
              student: "664f1a2b3c4d5e6f7a8b9c0d"
              amount: 450000
              month: "2024-06-01"
              note: "Naqd to'landi"
      responses:
        "201":
          description: Payment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment:
                    $ref: "#/components/schemas/Payment"
                  code:
                    type: string
                    example: "paymentCreated"
                  message:
                    type: string
                    example: "To'lov qabul qilindi"
        "400":
          description: Missing fields, inactive enrollment, or duplicate payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingEnrollment:
                  value: { code: "missingField", message: "Ro'yxatga olish kiritilishi shart" }
                missingStudent:
                  value: { code: "missingField", message: "O'quvchi kiritilishi shart" }
                missingAmount:
                  value: { code: "missingField", message: "To'lov miqdori kiritilishi shart" }
                missingMonth:
                  value: { code: "missingField", message: "Oy kiritilishi shart" }
                enrollmentNotActive:
                  summary: Enrollment is not active
                  value: { code: "enrollmentNotActive", message: "Bu o'quvchi ro'yxati \"dropped\" holatida, to'lov qabul qilinmaydi" }
                duplicatePayment:
                  summary: Payment already recorded for this month
                  value: { code: "duplicatePayment", message: "Bu oy uchun to'lov allaqachon amalga oshirilgan" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Enrollment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "enrollmentNotFound"
                message: "Ro'yxatga olish topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /payments/{id}:
    get:
      tags: [Payments]
      summary: Get a single payment
      description: |
        Returns a single payment record by ID.

        **Access:**
        - `admin` / `teacher` — can retrieve any payment
        - `student` — can only retrieve their own payments (returns `403` otherwise)
      operationId: getPayment
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/paymentId"
      responses:
        "200":
          description: Payment returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment:
                    $ref: "#/components/schemas/Payment"
                  code:
                    type: string
                    example: "paymentsFound"
                  message:
                    type: string
                    example: "To'lov topildi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "paymentNotFound"
                message: "To'lov topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    put:
      tags: [Payments]
      summary: Update a payment
      description: |
        Updates an existing payment. Only `status`, `amount`, `note`, and `paidAt` can be changed.

        If `status` is set to `paid` and `paidAt` is not provided, `paidAt` is automatically set to the current time.

        **Access:** Admin, Teacher.
      operationId: updatePayment
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/paymentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentUpdateInput"
            examples:
              markPaid:
                summary: Mark payment as paid
                value:
                  status: "paid"
              markOverdue:
                summary: Mark payment as overdue
                value:
                  status: "overdue"
                  note: "Muddati o'tdi"
              updateAmount:
                summary: Correct the payment amount
                value:
                  amount: 500000
                  note: "Miqdor to'g'irlandi"
      responses:
        "200":
          description: Payment updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment:
                    $ref: "#/components/schemas/Payment"
                  code:
                    type: string
                    example: "paymentUpdated"
                  message:
                    type: string
                    example: "To'lov yangilandi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "paymentNotFound"
                message: "To'lov topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ══════════════════════════════════════════
  # ATTENDANCE
  # ══════════════════════════════════════════

  /attendance:
    get:
      tags: [Attendance]
      summary: List attendance records
      description: |
        Returns a paginated, filterable list of attendance records populated with student and group info.

        **Access rules:**
        - `admin` — can list all records; supports all filters
        - `teacher` — automatically scoped to groups where they are the teacher; a `group` filter outside their own groups returns `403`
        - `student` — automatically scoped to their own records; any `student` query param is overridden
      operationId: getAttendances
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - name: group
          in: query
          description: Filter by group ObjectId
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c10"
        - name: student
          in: query
          description: Filter by student ObjectId (ignored for role `student`)
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c0d"
        - name: enrollment
          in: query
          description: Filter by enrollment ObjectId
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c20"
        - name: status
          in: query
          description: Filter by attendance status
          schema:
            type: string
            enum: [present, absent]
            example: "present"
        - name: from
          in: query
          description: Inclusive lower bound of the session date (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2026-04-01"
        - name: to
          in: query
          description: Inclusive upper bound of the session date (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2026-04-30"
      responses:
        "200":
          description: Attendance records returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  attendance:
                    type: array
                    items:
                      $ref: "#/components/schemas/Attendance"
                  total:
                    type: integer
                    example: 12
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 1
                  hasNextPage:
                    type: boolean
                    example: false
                  hasPrevPage:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: "attendanceFound"
                  message:
                    type: string
                    example: "Davomat ma'lumotlari olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /attendance/session:
    get:
      tags: [Attendance]
      summary: Get per-enrollment snapshot for a single session day
      description: |
        Returns the per-enrollment roster for a group on a specific date, with each row
        showing whether the enrollment has been marked and the current status/note.
        Rows without an attendance record yet have `status: null` so the frontend can render an
        "unmarked" state.

        `isValidSchedule` tells the frontend whether the selected date is actually one of the
        group's scheduled weekdays — useful for disabling invalid dates in a date picker.

        **Access rules:**
        - `admin` — any group
        - `teacher` — only their own groups
        - `student` — only groups they are enrolled in; the returned rows are scoped to the student's own enrollment(s)
      operationId: getSessionAttendance
      security:
        - BearerAuth: []
      parameters:
        - name: group
          in: query
          required: true
          description: Group ObjectId
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c10"
        - name: date
          in: query
          required: true
          description: Session date (YYYY-MM-DD)
          schema:
            type: string
            format: date
            example: "2026-04-13"
      responses:
        "200":
          description: Session snapshot returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "664f1a2b3c4d5e6f7a8b9c10"
                      name:
                        type: string
                        example: "Python — Oqshom 1"
                      schedule:
                        type: object
                        properties:
                          days:
                            type: array
                            items:
                              type: string
                          time:
                            type: string
                  date:
                    type: string
                    format: date-time
                    example: "2026-04-13T00:00:00.000Z"
                  weekday:
                    type: string
                    example: "Monday"
                  isValidSchedule:
                    type: boolean
                    example: true
                  rows:
                    type: array
                    items:
                      $ref: "#/components/schemas/AttendanceSessionRow"
                  code:
                    type: string
                    example: "attendanceFound"
                  message:
                    type: string
                    example: "Davomat ma'lumotlari olindi"
        "400":
          description: Missing or invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing:
                  value: { code: "missingField", message: "Guruh va sana kiritilishi shart" }
                invalidDate:
                  value: { code: "invalidSessionDate", message: "Tanlangan sana guruh jadvaliga mos kelmaydi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "groupNotFound"
                message: "Guruh topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /attendance/sessions:
    get:
      tags: [Attendance]
      summary: Expand a group's weekly schedule into concrete session dates
      description: |
        Takes a group and a date range, and returns every date within the range whose weekday
        is listed in the group's `schedule.days`. Pure computation — does not touch the
        `Attendance` collection. Useful for showing "which days should have attendance" in a calendar.

        Defaults: if `from` and `to` are omitted, the range is the last 30 days through today (UTC).

        **Access rules:** same as `/attendance/session`.
      operationId: getScheduleSessions
      security:
        - BearerAuth: []
      parameters:
        - name: group
          in: query
          required: true
          description: Group ObjectId
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c10"
        - name: from
          in: query
          description: Inclusive start date (YYYY-MM-DD). Defaults to 30 days before today.
          schema:
            type: string
            format: date
            example: "2026-03-14"
        - name: to
          in: query
          description: Inclusive end date (YYYY-MM-DD). Defaults to today.
          schema:
            type: string
            format: date
            example: "2026-04-13"
      responses:
        "200":
          description: Expanded session dates
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                      schedule:
                        type: object
                        properties:
                          days:
                            type: array
                            items:
                              type: string
                          time:
                            type: string
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  sessions:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date-time
                          example: "2026-04-13T00:00:00.000Z"
                        weekday:
                          type: string
                          enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
                          example: "Monday"
                  code:
                    type: string
                    example: "attendanceFound"
                  message:
                    type: string
                    example: "Davomat ma'lumotlari olindi"
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing:
                  value: { code: "missingField", message: "Guruh kiritilishi shart" }
                invalidDate:
                  value: { code: "invalidSessionDate", message: "Tanlangan sana guruh jadvaliga mos kelmaydi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "groupNotFound"
                message: "Guruh topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /attendance/bulk:
    post:
      tags: [Attendance]
      summary: Mark attendance for all students of a group on a session day
      description: |
        Upserts one attendance record per entry, keyed by `(enrollment, date)`. Re-posting the
        same `(group, date, enrollment)` with a different status updates the existing record —
        it never creates duplicates.

        **Validation:**
        - The date's weekday must be listed in the group's `schedule.days`, otherwise returns `400 invalidSessionDate`.
        - Each `entries[i].enrollment` must belong to the specified group.

        **Access:** Teacher only, and only for groups where they are the assigned teacher.
      operationId: bulkMarkAttendance
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceBulkInput"
            examples:
              markSession:
                summary: Mark a Monday session
                value:
                  group: "664f1a2b3c4d5e6f7a8b9c10"
                  date: "2026-04-13"
                  entries:
                    - enrollment: "664f1a2b3c4d5e6f7a8b9c20"
                      status: "present"
                    - enrollment: "664f1a2b3c4d5e6f7a8b9c21"
                      status: "absent"
                      note: "Kasal"
      responses:
        "201":
          description: Attendance marked (or updated on re-post)
          content:
            application/json:
              schema:
                type: object
                properties:
                  attendance:
                    type: array
                    items:
                      $ref: "#/components/schemas/Attendance"
                  code:
                    type: string
                    example: "attendanceMarked"
                  message:
                    type: string
                    example: "Davomat belgilandi"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingGroup:
                  value: { code: "missingField", message: "Guruh kiritilishi shart" }
                missingDate:
                  value: { code: "missingField", message: "Sana kiritilishi shart" }
                emptyEntries:
                  value: { code: "missingField", message: "Davomat ro'yxati bo'sh" }
                invalidDate:
                  value: { code: "invalidSessionDate", message: "Tanlangan sana guruh jadvaliga mos kelmaydi" }
                enrollmentNotInGroup:
                  value: { code: "enrollmentNotInGroup", message: "Bu o'quvchi bu guruhga tegishli emas" }
                invalidStatus:
                  value: { code: "invalidStatus", message: "Status noto'g'ri" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Authenticated user is not the teacher of this group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "notGroupTeacher"
                message: "Siz bu guruhning o'qituvchisi emassiz"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "groupNotFound"
                message: "Guruh topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /attendance/{id}:
    put:
      tags: [Attendance]
      summary: Update a single attendance record
      description: |
        Updates `status` and/or `note` for one existing attendance record. `markedBy` is
        automatically set to the authenticated teacher.

        **Access:** Teacher only, and only for records that belong to their own group.
      operationId: updateAttendance
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/attendanceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceUpdateInput"
            examples:
              flipToAbsent:
                summary: Change status to absent with a note
                value:
                  status: "absent"
                  note: "Kasal"
      responses:
        "200":
          description: Attendance updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  attendance:
                    $ref: "#/components/schemas/Attendance"
                  code:
                    type: string
                    example: "attendanceUpdated"
                  message:
                    type: string
                    example: "Davomat yangilandi"
        "400":
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "invalidStatus"
                message: "Status noto'g'ri"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Authenticated user is not the teacher of this record's group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "notGroupTeacher"
                message: "Siz bu guruhning o'qituvchisi emassiz"
        "404":
          description: Attendance record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "attendanceNotFound"
                message: "Davomat topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Attendance]
      summary: Delete an attendance record
      description: |
        Permanently deletes a single attendance record.

        **Access:** Admin only.
      operationId: deleteAttendance
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/attendanceId"
      responses:
        "200":
          description: Attendance deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                code: "attendanceDeleted"
                message: "Davomat o'chirildi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Attendance record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "attendanceNotFound"
                message: "Davomat topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ══════════════════════════════════════════
  # LEADS
  # ══════════════════════════════════════════

  /leads:
    get:
      tags: [Leads]
      summary: List leads
      description: |
        Returns a paginated, filterable list of leads populated with `group` and `createdBy`.

        **Access:** Admin, Teacher.

        Sorted by `createdAt` descending (newest first).

        The `search` query is a case-insensitive substring match against `firstName`.
        If the search term parses as a number, it is also matched against `phone` exactly.
      operationId: getLeads
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - name: status
          in: query
          description: Filter by follow-up status
          schema:
            type: string
            enum: [new, contacted, interested, scheduled, converted, rejected]
            example: "new"
        - name: source
          in: query
          description: Filter by acquisition source
          schema:
            type: string
            enum: [telegram, instagram, referral, offline, other]
            example: "telegram"
        - name: group
          in: query
          description: Filter by interested-in Group ObjectId
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c10"
        - name: paymentStatus
          in: query
          description: Filter by deposit/payment status
          schema:
            type: string
            enum: [unpaid, partial, paid]
            example: "unpaid"
        - name: search
          in: query
          description: Search by `firstName` (substring, case-insensitive) or exact `phone`
          schema:
            type: string
            example: "ali"
      responses:
        "200":
          description: Leads returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  leads:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lead"
                  total:
                    type: integer
                    example: 37
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 2
                  hasNextPage:
                    type: boolean
                    example: true
                  hasPrevPage:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: "leadsFound"
                  message:
                    type: string
                    example: "Murojaatlar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Leads]
      summary: Create a lead
      description: |
        Creates a new lead record.

        **Access:** Admin, Teacher.

        The server:
        - Generates a unique `uniqueLink` (12-char hex slug) used for referral-click tracking.
        - Sets `createdBy` to the caller's user ID.
        - Sets `lastActivityAt` to the creation time.

        Only `firstName` is required. `telegramId` must be unique across leads when provided.
      operationId: createLead
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
            examples:
              minimal:
                summary: Minimal lead (firstName only)
                value:
                  firstName: "Ali"
              telegramBot:
                summary: Lead coming from Telegram bot
                value:
                  firstName: "Ali"
                  phone: 998901234567
                  telegramId: "123456789"
                  source: "telegram"
                  interest: "English evening course"
              withGroupInterest:
                summary: Lead with a target group + scheduled call
                value:
                  firstName: "Malika"
                  phone: 998977776655
                  source: "instagram"
                  group: "664f1a2b3c4d5e6f7a8b9c10"
                  level: "A1"
                  status: "scheduled"
                  scheduledAt: "2026-04-20T14:00:00.000Z"
                  notes: "Onasi qo'ng'iroq qildi"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                type: object
                properties:
                  lead:
                    $ref: "#/components/schemas/Lead"
                  code:
                    type: string
                    example: "leadCreated"
                  message:
                    type: string
                    example: "Yangi murojaat yaratildi"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingFirstName:
                  value: { code: "missingField", message: "Ism kiritilishi shart" }
                invalidStatus:
                  value: { code: "invalidLeadStatus", message: "Murojaat holati noto'g'ri" }
                invalidSource:
                  value: { code: "invalidField", message: "Manba noto'g'ri" }
                invalidPaymentStatus:
                  value: { code: "invalidField", message: "To'lov holati noto'g'ri" }
                invalidGender:
                  value: { code: "invalidField", message: "Jins noto'g'ri" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /leads/track/{uniqueLink}:
    get:
      tags: [Leads]
      summary: Track a referral-link click (public)
      description: |
        **Public endpoint — no authentication required.**

        Records that the lead's unique referral link was hit. On first call, sets `linkClickedAt`
        to the current time; every call bumps `lastActivityAt`.

        Intended for use from a Telegram bot, ad redirect, or landing page — anywhere the lead
        physically clicks their unique URL. The slug is long and random, so guessing another lead's
        link is not practical.

        Returns `204 No Content` on success (no response body).
      operationId: trackLeadClick
      parameters:
        - $ref: "#/components/parameters/leadUniqueLink"
      responses:
        "204":
          description: Click recorded (no body)
        "404":
          description: Lead not found for this uniqueLink
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "leadNotFound"
                message: "Murojaat topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /leads/{id}:
    get:
      tags: [Leads]
      summary: Get a lead by ID
      description: |
        Returns a single lead populated with `group` (name, price, teacher) and `createdBy` (firstName, lastName).

        **Access:** Admin, Teacher.
      operationId: getLead
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/leadId"
      responses:
        "200":
          description: Lead found
          content:
            application/json:
              schema:
                type: object
                properties:
                  lead:
                    $ref: "#/components/schemas/Lead"
                  code:
                    type: string
                    example: "leadsFound"
                  message:
                    type: string
                    example: "Murojaatlar ro'yxati olindi"
        "400":
          description: Invalid ObjectId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "invalidId"
                message: "Id noto'g'ri kiritildi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "leadNotFound"
                message: "Murojaat topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    put:
      tags: [Leads]
      summary: Update a lead
      description: |
        Partial update — only provided fields are changed. `lastActivityAt` is auto-bumped.

        **Access:** Admin, Teacher.

        **Typical flows:**
        - `{ "status": "contacted", "notes": "qo'ng'iroq qildim" }` — log a follow-up call.
        - `{ "status": "scheduled", "scheduledAt": "2026-04-20T14:00:00Z" }` — book a meeting.
        - `{ "status": "rejected", "rejectionReason": "Narx qimmat" }` — close the lead.
        - `{ "status": "converted" }` — mark as won; then create the `Enrollment` via `POST /enrollments`.
      operationId: updateLead
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/leadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdateInput"
            examples:
              markContacted:
                summary: Log first contact
                value:
                  status: "contacted"
                  notes: "Birinchi marta qo'ng'iroq qildim"
              scheduleMeeting:
                summary: Book a scheduled call
                value:
                  status: "scheduled"
                  scheduledAt: "2026-04-20T14:00:00.000Z"
              rejectLead:
                summary: Close as rejected
                value:
                  status: "rejected"
                  rejectionReason: "Narx juda qimmat"
              convertLead:
                summary: Flip to converted (then create Enrollment separately)
                value:
                  status: "converted"
                  paymentStatus: "paid"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  lead:
                    $ref: "#/components/schemas/Lead"
                  code:
                    type: string
                    example: "leadUpdated"
                  message:
                    type: string
                    example: "Murojaat yangilandi"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidStatus:
                  value: { code: "invalidLeadStatus", message: "Murojaat holati noto'g'ri" }
                invalidSource:
                  value: { code: "invalidField", message: "Manba noto'g'ri" }
                invalidPaymentStatus:
                  value: { code: "invalidField", message: "To'lov holati noto'g'ri" }
                invalidGender:
                  value: { code: "invalidField", message: "Jins noto'g'ri" }
                invalidId:
                  value: { code: "invalidId", message: "Id noto'g'ri kiritildi" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "leadNotFound"
                message: "Murojaat topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Leads]
      summary: Delete a lead
      description: |
        Permanently deletes a lead record.

        **Access:** Admin only.

        > Prefer flipping `status` to `rejected` or `converted` instead of deleting —
        > deletion loses source-attribution history.
      operationId: deleteLead
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/leadId"
      responses:
        "200":
          description: Lead deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                code: "leadDeleted"
                message: "Murojaat o'chirildi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "leadNotFound"
                message: "Murojaat topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ══════════════════════════════════════════
  # NOTIFICATIONS
  # ══════════════════════════════════════════

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      description: |
        Returns a paginated, filterable list of notifications populated with `sender`, `group`,
        and `feedback.author`.

        **Access:**
        - `admin` — sees every notification.
        - `teacher` — sees only notifications whose `group` is one they teach. If a `group`
          query filter is passed for a group they do not teach, responds `403 forbidden`.
        - `student` — sees only notifications they themselves sent.

        Sorted by `createdAt` descending (newest first).
      operationId: getNotifications
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/pageParam"
        - $ref: "#/components/parameters/limitParam"
        - name: status
          in: query
          description: Filter by notification status
          schema:
            type: string
            enum: [open, in_progress, resolved]
        - name: type
          in: query
          description: Filter by notification type
          schema:
            type: string
            enum: [complaint, suggestion, question, other]
        - name: group
          in: query
          description: Filter by group ObjectId
          schema:
            type: string
            example: "664f1a2b3c4d5e6f7a8b9c10"
      responses:
        "200":
          description: Notifications returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: "#/components/schemas/Notification"
                  total:
                    type: integer
                    example: 12
                  page:
                    type: integer
                    example: 1
                  limit:
                    type: integer
                    example: 20
                  totalPages:
                    type: integer
                    example: 1
                  hasNextPage:
                    type: boolean
                    example: false
                  hasPrevPage:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: "notificationsFound"
                  message:
                    type: string
                    example: "Xabarlar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    post:
      tags: [Notifications]
      summary: Create a notification
      description: |
        Creates a new notification tied to a group.

        **Access:** Student only. The student must be enrolled in `group`; otherwise
        responds `403 notEnrolledInGroup`.

        The server sets `sender` to the caller's user ID, `status` to `open`, and starts
        `feedback` as an empty array.
      operationId: createNotification
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationInput"
            examples:
              complaint:
                summary: Complaint about the classroom
                value:
                  group: "664f1a2b3c4d5e6f7a8b9c10"
                  title: "Xona juda sovuq"
                  message: "Iltimos, isitgichni yoqsangiz"
                  type: "complaint"
              question:
                summary: Question without a type
                value:
                  group: "664f1a2b3c4d5e6f7a8b9c10"
                  title: "Dars vaqti o'zgaradimi?"
                  message: "Ertaga dars bo'ladimi?"
      responses:
        "201":
          description: Notification created
          content:
            application/json:
              schema:
                type: object
                properties:
                  notification:
                    $ref: "#/components/schemas/Notification"
                  code:
                    type: string
                    example: "notificationCreated"
                  message:
                    type: string
                    example: "Xabar muvaffaqiyatli yuborildi"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingGroup:
                  value: { code: "missingField", message: "Guruh kiritilishi shart" }
                missingTitle:
                  value: { code: "missingField", message: "Sarlavha kiritilishi shart" }
                missingMessage:
                  value: { code: "missingField", message: "Xabar matni kiritilishi shart" }
                invalidType:
                  value: { code: "invalidField", message: "Xabar turi noto'g'ri" }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not a student, or student not enrolled in the group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                forbidden:
                  value: { code: "forbidden", message: "Ruxsat berilmadi" }
                notEnrolledInGroup:
                  value: { code: "notEnrolledInGroup", message: "Siz bu guruhga a'zo emassiz" }
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "groupNotFound"
                message: "Guruh topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /notifications/{id}:
    get:
      tags: [Notifications]
      summary: Get a single notification
      description: |
        Returns the notification with its populated sender, group, and `feedback.author`.

        **Access:**
        - `admin` — any notification.
        - `teacher` — only if they teach the notification's `group`.
        - `student` — only if they are the `sender`.
      operationId: getNotification
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/notificationId"
      responses:
        "200":
          description: Notification returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  notification:
                    $ref: "#/components/schemas/Notification"
                  code:
                    type: string
                    example: "notificationsFound"
                  message:
                    type: string
                    example: "Xabarlar ro'yxati olindi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "notificationNotFound"
                message: "Xabar topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Notifications]
      summary: Delete a notification
      description: |
        Permanently deletes a notification and its embedded feedback thread.

        **Access:** Admin only. Students cannot delete notifications they have sent
        (preserves audit trail); teachers cannot delete either.
      operationId: deleteNotification
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/notificationId"
      responses:
        "200":
          description: Notification deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                code: "notificationDeleted"
                message: "Xabar o'chirildi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "notificationNotFound"
                message: "Xabar topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /notifications/{id}/status:
    patch:
      tags: [Notifications]
      summary: Update notification status
      description: |
        Moves a notification through the workflow: `open` → `in_progress` → `resolved`.

        **Access:** Admin, or the teacher of the notification's group. Students cannot
        change status.
      operationId: updateNotificationStatus
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/notificationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationStatusInput"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  notification:
                    $ref: "#/components/schemas/Notification"
                  code:
                    type: string
                    example: "notificationUpdated"
                  message:
                    type: string
                    example: "Xabar yangilandi"
        "400":
          description: Invalid status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "invalidField"
                message: "Holat noto'g'ri"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "notificationNotFound"
                message: "Xabar topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /notifications/{id}/feedback:
    post:
      tags: [Notifications]
      summary: Add a feedback entry to a notification
      description: |
        Appends a reply to the notification's embedded `feedback` array.

        **Access:** Admin, or the teacher of the notification's group.

        The server sets the entry's `role` from the caller's user role (`admin` or `teacher`)
        and `author` to the caller's user ID. The client never sets `role` — this is what
        guarantees each reply is clearly attributable to a teacher or an admin.
      operationId: addNotificationFeedback
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/notificationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationFeedbackInput"
      responses:
        "201":
          description: Feedback added
          content:
            application/json:
              schema:
                type: object
                properties:
                  notification:
                    $ref: "#/components/schemas/Notification"
                  code:
                    type: string
                    example: "feedbackAdded"
                  message:
                    type: string
                    example: "Javob qo'shildi"
        "400":
          description: Missing message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "missingField"
                message: "Xabar matni kiritilishi shart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "notificationNotFound"
                message: "Xabar topilmadi"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /notifications/{id}/feedback/{feedbackId}:
    put:
      tags: [Notifications]
      summary: Update a feedback entry
      description: |
        Updates the `message` of a feedback entry.

        **Access:** Only the author of that specific feedback entry. Admins do not override
        authorship for edits — they can still edit their own entries.
      operationId: updateNotificationFeedback
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/notificationId"
        - $ref: "#/components/parameters/notificationFeedbackId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationFeedbackInput"
      responses:
        "200":
          description: Feedback updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  notification:
                    $ref: "#/components/schemas/Notification"
                  code:
                    type: string
                    example: "feedbackUpdated"
                  message:
                    type: string
                    example: "Javob yangilandi"
        "400":
          description: Missing message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "missingField"
                message: "Xabar matni kiritilishi shart"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller is not the author of this feedback entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "notFeedbackAuthor"
                message: "Siz bu javobning muallifi emassiz"
        "404":
          description: Notification or feedback entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notificationNotFound:
                  value: { code: "notificationNotFound", message: "Xabar topilmadi" }
                feedbackNotFound:
                  value: { code: "feedbackNotFound", message: "Javob topilmadi" }
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Notifications]
      summary: Delete a feedback entry
      description: |
        Removes a feedback entry from the notification's embedded `feedback` array.

        **Access:** The author of the entry, or any admin.
      operationId: deleteNotificationFeedback
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/notificationId"
        - $ref: "#/components/parameters/notificationFeedbackId"
      responses:
        "200":
          description: Feedback deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"
              example:
                code: "feedbackDeleted"
                message: "Javob o'chirildi"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller is neither the author nor an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: "notFeedbackAuthor"
                message: "Siz bu javobning muallifi emassiz"
        "404":
          description: Notification or feedback entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                notificationNotFound:
                  value: { code: "notificationNotFound", message: "Xabar topilmadi" }
                feedbackNotFound:
                  value: { code: "feedbackNotFound", message: "Javob topilmadi" }
        "429":
          $ref: "#/components/responses/TooManyRequests"

# ─────────────────────────────────────────────

# ─────────────────────────────────────────────
# Statistics paths
# ─────────────────────────────────────────────

  /statistics/overview:
    get:
      tags: [Statistics]
      summary: Dashboard KPIs
      operationId: getStatisticsOverview
      description: |
        Returns four high-level key performance indicators for the current calendar month:
        - Total leads (all-time)
        - Total active students (deduplicated across groups)
        - Revenue collected this calendar month
        - Attendance rate this calendar month (%)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: KPI snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      totalLeads:
                        type: integer
                        description: All-time total number of leads
                        example: 342
                      totalActiveStudents:
                        type: integer
                        description: Number of unique students with at least one active enrollment
                        example: 118
                      revenueThisMonth:
                        type: number
                        description: Sum of all payments marked `paid` this calendar month (UZS)
                        example: 24300000
                      attendanceRateThisMonth:
                        type: integer
                        description: Percentage of attendance records marked `present` this month
                        minimum: 0
                        maximum: 100
                        example: 84
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /statistics/leads:
    get:
      tags: [Statistics]
      summary: Lead analytics
      operationId: getStatisticsLeads
      description: |
        Returns a full breakdown of the lead pipeline:

        - **byStatus** — count per status value (`new`, `contacted`, `interested`, `scheduled`, `converted`, `rejected`)
        - **bySource** — count per acquisition channel (`telegram`, `instagram`, `referral`, `offline`, `other`)
        - **byGender** — count for `male` / `female` (leads with no gender are excluded)
        - **monthlyTrend** — per-month totals and converted count for the last 6 months
        - **conversionRate** — `converted / totalLeads x 100` (integer %)

        All counts respect the optional `startDate` / `endDate` filter on `createdAt`.
        The trend series always covers the last 6 calendar months regardless of the date filter.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/startDate"
        - $ref: "#/components/parameters/endDate"
      responses:
        "200":
          description: Lead analytics payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      totalLeads:
                        type: integer
                        example: 342
                      conversionRate:
                        type: integer
                        description: Percentage of leads that converted (0-100)
                        example: 23
                      byStatus:
                        type: array
                        items:
                          type: object
                          properties:
                            status:
                              type: string
                              enum: [new, contacted, interested, scheduled, converted, rejected]
                              example: "new"
                            count:
                              type: integer
                              example: 95
                        example:
                          - { status: "new",       count: 95 }
                          - { status: "contacted", count: 72 }
                          - { status: "interested", count: 58 }
                          - { status: "scheduled", count: 39 }
                          - { status: "converted", count: 47 }
                          - { status: "rejected",  count: 31 }
                      bySource:
                        type: array
                        items:
                          type: object
                          properties:
                            source:
                              type: string
                              enum: [telegram, instagram, referral, offline, other]
                              example: "instagram"
                            count:
                              type: integer
                              example: 140
                        example:
                          - { source: "instagram", count: 140 }
                          - { source: "telegram",  count: 85  }
                          - { source: "referral",  count: 62  }
                          - { source: "offline",   count: 35  }
                          - { source: "other",     count: 20  }
                      byGender:
                        type: array
                        items:
                          type: object
                          properties:
                            gender:
                              type: string
                              enum: [male, female]
                            count:
                              type: integer
                        example:
                          - { gender: "male",   count: 198 }
                          - { gender: "female", count: 122 }
                      monthlyTrend:
                        type: array
                        description: One entry per calendar month, last 6 months, sorted ascending
                        items:
                          type: object
                          properties:
                            year:
                              type: integer
                              example: 2026
                            month:
                              type: integer
                              minimum: 1
                              maximum: 12
                              example: 4
                            total:
                              type: integer
                              description: Total leads created in this month
                              example: 58
                            converted:
                              type: integer
                              description: Of those leads, how many were converted
                              example: 12
                        example:
                          - { year: 2025, month: 11, total: 42, converted: 9  }
                          - { year: 2025, month: 12, total: 55, converted: 11 }
                          - { year: 2026, month: 1,  total: 48, converted: 10 }
                          - { year: 2026, month: 2,  total: 61, converted: 14 }
                          - { year: 2026, month: 3,  total: 78, converted: 18 }
                          - { year: 2026, month: 4,  total: 58, converted: 12 }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
