  /statistics/students:
    get:
      tags: [Statistics]
      summary: Student and enrollment analytics
      operationId: getStatisticsStudents
      description: |
        Returns student and enrollment-level metrics:

        - **enrollmentsByStatus** — count of enrollments per status (`active`, `completed`, `dropped`)
        - **genderDistribution** — male/female breakdown of all users with `role=student`
        - **debtOverview** — how many active enrollments carry outstanding debt, total debt and balance amounts
        - **studentsPerGroup** — active student count per group, sorted descending

        The optional `startDate` / `endDate` filter applies to `enrolledAt`.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/startDate"
        - $ref: "#/components/parameters/endDate"
      responses:
        "200":
          description: Student analytics payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      enrollmentsByStatus:
                        type: array
                        items:
                          type: object
                          properties:
                            status:
                              type: string
                              enum: [active, completed, dropped]
                            count:
                              type: integer
                        example:
                          - { status: "active",    count: 118 }
                          - { status: "completed", count: 45  }
                          - { status: "dropped",   count: 22  }
                      genderDistribution:
                        type: array
                        items:
                          type: object
                          properties:
                            gender:
                              type: string
                              enum: [male, female]
                            count:
                              type: integer
                        example:
                          - { gender: "male",   count: 74 }
                          - { gender: "female", count: 44 }
                      debtOverview:
                        type: object
                        properties:
                          activeEnrollments:
                            type: integer
                            description: Total number of currently active enrollments
                            example: 118
                          studentsInDebt:
                            type: integer
                            description: Number of active enrollments where debt is greater than zero
                            example: 31
                          totalOutstandingDebt:
                            type: number
                            description: Sum of all debt values across active enrollments (UZS)
                            example: 7200000
                          totalBalance:
                            type: number
                            description: Sum of all credit balances across active enrollments (UZS)
                            example: 1050000
                      studentsPerGroup:
                        type: array
                        description: Active enrollments per group, sorted by student count descending
                        items:
                          type: object
                          properties:
                            groupId:
                              type: string
                              example: "664f1a2b3c4d5e6f7a8b9c10"
                            groupName:
                              type: string
                              example: "Python — Oqshom 1"
                            studentCount:
                              type: integer
                              example: 14
                        example:
                          - { groupId: "664f1a2b3c4d5e6f7a8b9c10", groupName: "Python — Oqshom 1", studentCount: 14 }
                          - { groupId: "664f1a2b3c4d5e6f7a8b9c11", groupName: "English — Ertalab",  studentCount: 11 }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /statistics/revenue:
    get:
      tags: [Statistics]
      summary: Revenue and payment analytics
      operationId: getStatisticsRevenue
      description: |
        Returns financial metrics across payments and enrollments:

        - **monthlyRevenue** — monthly collected revenue for the last 6 months (paid payments only)
        - **totalCollected** — total amount collected (within optional date range)
        - **totalPaymentsCount** — number of paid payment records
        - **expectedMonthlyRevenue** — sum of `(group.price - enrollment.discount)` for all active enrollments
        - **totalOutstandingDebt** — sum of `debt` across all active enrollments
        - **totalBalance** — sum of `balance` (credit) across all active enrollments
        - **paymentStatusDistribution** — count and sum per payment status (`paid`, `pending`, `overdue`)

        The optional `startDate` / `endDate` filter applies to `paidAt`.
        The 6-month trend series always covers the last 6 calendar months.
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/startDate"
        - $ref: "#/components/parameters/endDate"
      responses:
        "200":
          description: Revenue analytics payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      monthlyRevenue:
                        type: array
                        description: Collected revenue per month, last 6 months, sorted ascending
                        items:
                          type: object
                          properties:
                            year:
                              type: integer
                              example: 2026
                            month:
                              type: integer
                              minimum: 1
                              maximum: 12
                              example: 4
                            collected:
                              type: number
                              description: Total amount of paid payments in this month (UZS)
                              example: 24300000
                            payments:
                              type: integer
                              description: Number of paid payment records in this month
                              example: 54
                        example:
                          - { year: 2025, month: 11, collected: 18600000, payments: 41 }
                          - { year: 2025, month: 12, collected: 21000000, payments: 47 }
                          - { year: 2026, month: 1,  collected: 22500000, payments: 50 }
                          - { year: 2026, month: 2,  collected: 20700000, payments: 46 }
                          - { year: 2026, month: 3,  collected: 23400000, payments: 52 }
                          - { year: 2026, month: 4,  collected: 24300000, payments: 54 }
                      totalCollected:
                        type: number
                        description: All-time (or date-filtered) total collected amount (UZS)
                        example: 130500000
                      totalPaymentsCount:
                        type: integer
                        description: Number of paid payment records included in totalCollected
                        example: 290
                      expectedMonthlyRevenue:
                        type: number
                        description: >
                          Sum of effective monthly fees for all active enrollments
                          (group price minus any per-enrollment discount). Represents
                          ideal monthly revenue if every student pays in full.
                        example: 53100000
                      totalOutstandingDebt:
                        type: number
                        description: Total debt owed across all active enrollments (UZS)
                        example: 7200000
                      totalBalance:
                        type: number
                        description: Total credit balance held across all active enrollments (UZS)
                        example: 1050000
                      paymentStatusDistribution:
                        type: array
                        description: Breakdown of all payment records by status
                        items:
                          type: object
                          properties:
                            status:
                              type: string
                              enum: [paid, pending, overdue]
                            count:
                              type: integer
                              description: Number of payment records with this status
                            total:
                              type: number
                              description: Sum of amounts for records with this status (UZS)
                        example:
                          - { status: "paid",    count: 290, total: 130500000 }
                          - { status: "pending", count: 28,  total: 12600000  }
                          - { status: "overdue", count: 11,  total: 4950000   }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /statistics/attendance:
